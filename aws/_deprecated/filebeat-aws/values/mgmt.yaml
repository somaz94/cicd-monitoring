---
daemonset:
  # Annotations to apply to the daemonset
  annotations: {}
  # additionals labels
  labels: {}
  affinity: {}
  # Include the daemonset
  enabled: false

deployment:
  # Annotations to apply to the deployment
  annotations: {}
  # additionals labels
  labels: {}
  affinity: {}
  # Include the deployment
  enabled: true
  # Extra environment variables for Filebeat container.
  envFrom: []
  # - configMapRef:
  #     name: config-secret
  extraEnvs:
    - name: "ELASTICSEARCH_USERNAME"
      value: "example-user"
    - name: "ELASTICSEARCH_PASSWORD"
      value: "example-password"
    - name: "TZ"
      value: "Asia/Seoul"
  # Allows you to add any config files in /usr/share/filebeat
  extraVolumes: []
  # - name: extras
  #   emptyDir: {}
  extraVolumeMounts: []
  # - name: extras
  #   mountPath: /usr/share/extras
  #   readOnly: true
  # such as filebeat.yml for deployment
  filebeatConfig:
    filebeat.yml: |
      filebeat.inputs:
      - type: log
        paths:
          - /usr/share/filebeat/app/example-app/alpha/game/logs/*  # Log files from mounted path
          - /usr/share/filebeat/app/example-app/alpha/game/logs/**/*
        fields:
          log_source: "alpha-example-app-game"  # This value becomes the Elasticsearch index name
          environment: "alpha"
          app: "example-app"
          component: "game"
        fields_under_root: true
        json.keys_under_root: true      # Promote JSON fields to root level
        json.add_error_key: true        # Add error field on JSON parsing failure
        json.expand_keys: true          # Expand nested JSON strings into objects
        processors:
          - decode_json_fields:
              fields: ["data"]
              process_array: true
              max_depth: 2
              target: ""
              overwrite_keys: true
          - script:
              lang: javascript
              source: |
                function process(event) {
                  if (event.data && event.data.requestBody) {
                    try {
                      event.data.requestBody = JSON.parse(event.data.requestBody);
                    } catch (e) {}
                  }
                  if (event.data && event.data.responseBody) {
                    try {
                      event.data.responseBody = JSON.parse(event.data.responseBody);
                    } catch (e) {}
                  }
                  if (event.stack && Array.isArray(event.stack)) {
                    try {
                      event.stack = event.stack.map(function(str) {
                        return str.replace(/\\n/g, '\n');
                      });
                    } catch (e) {}
                  }
                  return event;
                }
      - type: log
        paths:
          - /usr/share/filebeat/app/example-app/alpha/battle/logs/*  # Log files from mounted path
          - /usr/share/filebeat/app/example-app/alpha/battle/logs/**/*
        fields:
          log_source: "alpha-example-app-battle"  # This value becomes the Elasticsearch index name
          environment: "alpha"
          app: "example-app"
          component: "battle"
        fields_under_root: true
        json.keys_under_root: true      # Promote JSON fields to root level
        json.add_error_key: true        # Add error field on JSON parsing failure
        json.expand_keys: true          # Expand nested JSON strings into objects
        processors:
          - decode_json_fields:
              fields: ["data"]
              process_array: true
              max_depth: 2
              target: ""
              overwrite_keys: true
          - rename:
              fields:
                - from: "Properties.data"
                  to: "data"
          - script:
              lang: javascript
              source: |
                function process(event) {
                  if (event.data && event.data.requestBody) {
                    try {
                      event.data.requestBody = JSON.parse(event.data.requestBody);
                    } catch (e) {}
                  }
                  if (event.data && event.data.responseBody) {
                    try {
                      event.data.responseBody = JSON.parse(event.data.responseBody);
                    } catch (e) {}
                  }
                  if (event.stack && Array.isArray(event.stack)) {
                    try {
                      event.stack = event.stack.map(function(str) {
                        return str.replace(/\\n/g, '\n');
                      });
                    } catch (e) {}
                  }
                  return event;
                }

      output.logstash:
        hosts: ["logstash.example.com:32087"]
        
  nodeSelector:
    eks.amazonaws.com/nodegroup: Example-NodeGroup-worker-node
  # A list of secrets and their paths to mount inside the pod
  # This is useful for mounting certificates for security other sensitive values
  secretMounts: []
  #  - name: filebeat-certificates
  #    secretName: filebeat-certificates
  #    path: /usr/share/filebeat/certs
  #
  # - User that the container will execute as.
  # Not necessary to run as root (0) as the Filebeat Deployment use cases do not need access to Kubernetes Node internals
  # - Typically not necessarily unless running within environments such as OpenShift.
  securityContext:
    runAsUser: 0
    privileged: false
  resources:
    requests:
      cpu: "100m"
      memory: "100Mi"
    limits:
      cpu: "1000m"
      memory: "500Mi"
  tolerations: []

persistentVolumeClaims:
  enabled: false

persistentVolumes:
  enabled: false

efs:
  persistentVolumes:
    enabled: true
    items:
      - name: "alpha-example-app-game-app-logs-pv-filebeat"
        fileSystemId: "fs-xxxxxxxxxxxx"
        accessPointId: "fsap-xxxxxxxxxxx"  # Access Point ID created by Terraform
        storage: "5Gi"
        volumeMode: Filesystem
        accessModes:
          - ReadWriteMany
        reclaimPolicy: Retain
        storageClassName: "efs-sc"

      - name: "alpha-example-app-battle-app-logs-pv-filebeat"
        fileSystemId: "fs-xxxxxxxxxxxx"
        accessPointId: "fsap-xxxxxxxxxxx"  # Access Point ID created by Terraform
        storage: "5Gi"
        volumeMode: Filesystem
        accessModes:
          - ReadWriteMany
        reclaimPolicy: Retain
        storageClassName: "efs-sc"

  persistentVolumeClaims:
    enabled: true
    items:
      - name: "alpha-example-app-game-app-logs-pvc-filebeat"
        accessModes:
          - ReadWriteMany
        storageClassName: "efs-sc"
        storage: "5Gi"
        mountPath: "/usr/share/filebeat/app/example-app/alpha/game/logs"
        selector:
          volumeName: "alpha-example-app-game-app-logs-pv-filebeat"

      - name: "alpha-example-app-battle-app-logs-pvc-filebeat"
        accessModes:
          - ReadWriteMany
        storageClassName: "efs-sc"
        storage: "5Gi"
        mountPath: "/usr/share/filebeat/app/example-app/alpha/battle/logs"
        selector:
          volumeName: "alpha-example-app-battle-app-logs-pv-filebeat"

# Replicas being used for the filebeat deployment
replicas: 1

extraContainers: ""
# - name: dummy-init
#   image: busybox
#   command: ['echo', 'hey']

extraInitContainers: []
# - name: dummy-init

# Root directory where Filebeat will write data to in order to persist registry data across pod restarts (file position and other metadata).
hostPathRoot: /var/lib

dnsConfig: {}
# options:
#   - name: ndots
#     value: "2"
hostAliases: []
#- ip: "127.0.0.1"
#  hostnames:
#  - "foo.local"
#  - "bar.local"
image: "docker.elastic.co/beats/filebeat"
imageTag: "8.5.1"
imagePullPolicy: "IfNotPresent"
imagePullSecrets: []
