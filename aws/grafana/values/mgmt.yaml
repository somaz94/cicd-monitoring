resources: {}
#  limits:
#    cpu: 100m
#    memory: 128Mi
#  requests:
#    cpu: 100m
#    memory: 128Mi

# -- Schedule Grafana on specific EKS nodes using nodeSelector.
# nodeSelector:
#   eks.amazonaws.com/nodegroup: Example-NodeGroup-worker-node

# sidecar:
#   datasources:
#     enabled: true

# ── Persistence with EFS (ReadWriteMany) ──
persistence:
  type: pvc
  enabled: true
  storageClassName: efs-sc
  accessModes:
    - ReadWriteMany
  size: 10Gi
  finalizers:
    - kubernetes.io/pvc-protection

# ── Persistence with EBS alternative (ReadWriteOnce) ──
# persistence:
#   type: pvc
#   enabled: true
#   storageClassName: ebs-sc
#   accessModes:
#     - ReadWriteOnce
#   size: 10Gi
#   finalizers:
#     - kubernetes.io/pvc-protection

initChownData:
  enabled: true
  image:
    registry: docker.io
    repository: library/busybox
    tag: "1.31.1"
    sha: ""
    pullPolicy: IfNotPresent
  resources: {}

