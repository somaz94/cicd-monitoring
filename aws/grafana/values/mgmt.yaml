#     cert-manager.io/cluster-issuer: "letsencrypt-issuer"
#   hosts:
#     - grafana.somaz.example.com
#   tls:
#     - secretName: grafana-tls
#       hosts:
#         - grafana.somaz.example.com

# ── Persistence with EFS (ReadWriteMany) ──
persistence:
  type: pvc
  enabled: true
  storageClassName: efs-sc
  accessModes:
    - ReadWriteMany
  size: 10Gi

