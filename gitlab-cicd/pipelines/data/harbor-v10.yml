stages:
  - validate_and_update_server # 데이터 검증 및 버전 업데이트
  - process_data_and_trigger # 서버 데이터 업데이트 및 파이프라인 트리거
  - update_client # 클라이언트 데이터 업데이트

variables:
  STAGES:
    value: "process_data_and_trigger"
    description: "Select the stages: process_data_and_trigger or update_client(use web)"
    options:
      - "process_data_and_trigger"
      - "update_client"

.change_files: &change_files
  changes:
    - json/**/*
    - csv/Language.csv
    - "!.gitlab-ci.yml"

.templates:
  .common_job_config: &common_job_config
    # interruptible: true
    retry:
      max: 2
      when:
        - runner_system_failure
        - unknown_failure
        - data_integrity_failure
      exit_codes:
        - 137 # OOM kill retry
        - 1 # 일반적인 명령 실패(pre-receive hook 오류 포함)
  .common_before_script: &common_before_script
    - apk update && apk add jq openssh-client rsync git curl git-lfs nodejs npm
    - git lfs install
    - eval $(ssh-agent -s)
    - SSH_KEY="${NFS_SSH_PRIVATE_KEY}"
    - echo "${SSH_KEY}" | ssh-add -
    - mkdir -p ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\nUserKnownHostsFile=/dev/null" > ~/.ssh/config

validate_and_update_server:
  <<: *common_job_config
  stage: validate_and_update_server
  resource_group: validate_and_update_server
  # image: alpine:latest
  image: registry.example.com/library/alpine:latest
  before_script: *common_before_script
  script:
    # Git 설정 및 저장소 준비
    - git config --global user.email "cicd@example.com"
    - git config --global user.name "cicd"
    - git config --global push.default current
    - git remote add gitlab_origin http://cicd:${CICD_ACCESS_TOKEN}@gitlab.example.com/gamedesign/example-project.git
    - git sparse-checkout init --cone
    - git sparse-checkout set version/ json/ enum/ csv/ script/
    - git checkout ${CI_COMMIT_REF_NAME}
    - git pull
    - cd script
    - npm install
    - npm run versions -- version "$CI_COMMIT_SHORT_SHA"
    - cd ..

    # 변경사항이 있는지 확인 (DataVersion.json만)
    - CHANGES=$(git status --porcelain version/DataVersion.json | wc -l)
    - |
      # DataVersion.json에 변경사항이 있으면 커밋하고 동기화
      if [ "$CHANGES" -gt "0" ]; then 
        # 현재 변경사항 모두 스테이징 취소
        git reset HEAD .
        # DataVersion.json만 스테이징
        git add version/DataVersion.json
        git commit -m "Update DataVersion.json version: $CI_COMMIT_SHORT_SHA"
        git push gitlab_origin ${CI_COMMIT_REF_NAME}

        # 폴더 생성
        ssh deploy@dev-cluster.example.com "mkdir -p /mnt/nfs/example-project/$CI_COMMIT_REF_NAME/client/master-data/version/$CI_COMMIT_SHORT_SHA/"

        # DataVersion.json을 클라이언트와 서버에 동기화
        CLIENT_DESTINATION_VERSION="deploy@dev-cluster.example.com:/mnt/nfs/example-project/$CI_COMMIT_REF_NAME/client/master-data/version/"
        CLIENT_DESTINATION_VERSION_COMMIT_SHA="deploy@dev-cluster.example.com:/mnt/nfs/example-project/$CI_COMMIT_REF_NAME/client/master-data/version/$CI_COMMIT_SHORT_SHA/"
        SERVER_DESTINATION_VERSION="deploy@dev-cluster.example.com:/mnt/nfs/example-project/$CI_COMMIT_REF_NAME/server/version/"
        rsync -avzr --delete --progress version/DataVersion.json "$CLIENT_DESTINATION_VERSION"
        rsync -avzr --delete --progress version/DataVersion.json "$CLIENT_DESTINATION_VERSION_COMMIT_SHA"
        rsync -avzr --delete --progress version/DataVersion.json "$SERVER_DESTINATION_VERSION"
      fi
  tags:
    - build-image
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      <<: *change_files

process_data_and_trigger:
  <<: *common_job_config
  stage: process_data_and_trigger
  resource_group: server_data_upload
  # image: alpine:latest
  image: registry.example.com/library/alpine:latest
  before_script: *common_before_script
  script:
    - git config --global user.email "cicd@example.com"
    - git config --global user.name "cicd"
    - git checkout ${CI_COMMIT_REF_NAME}
    - git pull
    - DESTINATION="deploy@dev-cluster.example.com:/mnt/nfs/example-project/$CI_COMMIT_REF_NAME/server/data/"
    - rsync -avzr --delete --progress json/ "$DESTINATION"
  after_script:
    - |
      echo "🔄 Processing Files..."
      echo "----------------------------------------"

      # script 폴더로 이동하여 의존성 설치 및 Excel 파일 처리
      cd script
      npm install
      npm run parse:all

      echo "----------------------------------------"

      cd ..
      # cs 폴더를 루트로 이동
      mv script/cs .

      # GitLab API를 통해 서버 파이프라인 트리거
      # - token: 파이프라인 트리거 토큰
      # - ref: 브랜치 이름
      # - variables: 파이프라인에 전달할 변수들
      #   - project_id: 현재 프로젝트 ID
      #   - job_id: 현재 작업 ID
      #   - NAMESPACE: 현재 브랜치 이름
      curl -X POST \
        -F token=${PROJECT_CLIENT_TRIGGER_TOKEN} \
        -F ref=master \
        -F variables[project_id]=${CI_PROJECT_ID} \
        -F variables[job_id]=${CI_JOB_ID} \
        -F variables[NAMESPACE]=${CI_COMMIT_REF_NAME} \
        "http://gitlab.example.com/api/v4/projects/20/trigger/pipeline"

      # 변경된 파일이 있으면 서버 파이프라인 트리거

      # GitLab API를 통해 서버 파이프라인 트리거
      # - token: 파이프라인 트리거 토큰
      # - ref: 브랜치 이름
      # - variables: 파이프라인에 전달할 변수들
      #   - project_id: 현재 프로젝트 ID
      #   - job_id: 현재 작업 ID
      #   - NAMESPACE: 현재 브랜치 이름
      curl -X POST \
        -F token=${PROJECT_SERVER_TRIGGER_TOKEN} \
        -F ref=${CI_COMMIT_REF_NAME} \
        -F variables[project_id]=${CI_PROJECT_ID} \
        -F variables[job_id]=${CI_JOB_ID} \
        -F variables[NAMESPACE]=${CI_COMMIT_REF_NAME} \
        "http://gitlab.example.com/api/v4/projects/12/trigger/pipeline"

  # 작업 결과물 저장 설정
  artifacts:
    paths:
      - json/**/* # json 아티팩트 유지
      - version/DataVersion.json
      - enum/**/* # enum 폴더 추가
      - cs/**/* # cs 폴더 (루트 디렉토리)
    expire_in: 1 days

  tags:
    - build-image # 특정 GitLab Runner 태그 지정

  # 작업 실행 규칙
  rules:
    # push 이벤트인 경우
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success # 이전 작업이 성공한 경우에만 실행
      needs:
        - job: validate_and_update_server # validate_and_update_server 작업이 필요
          artifacts: true # validate_and_update_server 작업의 결과물이 필요
      <<: *change_files # 파일 변경 관련 규칙 적용

    # 웹 인터페이스에서 수동으로 트리거하고 STAGES가 process_data_and_trigger인 경우
    - if: '$CI_PIPELINE_SOURCE == "web" && $STAGES == "process_data_and_trigger"'
      when: always # 항상 실행

update_client:
  <<: *common_job_config
  stage: update_client
  resource_group: client_data_upload
  # image: alpine:latest
  image: registry.example.com/library/alpine:latest
  before_script: *common_before_script
  script:
    - git config --global user.email "cicd@example.com"
    - git config --global user.name "cicd"
    - git sparse-checkout init --cone
    - git sparse-checkout set json/ csv/ version/
    - git checkout ${CI_COMMIT_REF_NAME}
    - git pull
    - DESTINATION_SHA="deploy@dev-cluster.example.com:/mnt/nfs/example-project/$CI_COMMIT_REF_NAME/client/master-data/raw/$CI_COMMIT_SHORT_SHA/"
    - |
      # 마지막 DataVersion.json 업데이트 커밋 찾기
      LAST_VERSION_COMMIT=$(git log --grep="Update DataVersion.json version:" -2 --format="%H" | tail -n 1 || git rev-list --max-parents=0 HEAD)
      PREVIOUS_SHA=$(echo $LAST_VERSION_COMMIT | cut -c1-8)
      echo "Previous version commit SHA: $PREVIOUS_SHA"
      echo "Current commit SHA: $CI_COMMIT_SHORT_SHA"

    # 최신 10개를 제외한 모든 이전 버전 삭제
    - echo "Removing all versions except the latest 10..."
    - |
      ssh deploy@dev-cluster.example.com "cd /mnt/nfs/example-project/$CI_COMMIT_REF_NAME/client/master-data/raw/ && \
        ls -t | tail -n +11 | xargs -r rm -rf"
      ssh deploy@dev-cluster.example.com "cd /mnt/nfs/example-project/$CI_COMMIT_REF_NAME/client/master-data/zip/ && \
        ls -t | tail -n +11 | xargs -r rm -f"
      ssh deploy@dev-cluster.example.com "cd /mnt/nfs/example-project/$CI_COMMIT_REF_NAME/client/master-data/version/ && \
        ls -t | tail -n +11 | xargs -r rm -rf"

    # 현재 커밋 디렉토리 생성
    - ssh deploy@dev-cluster.example.com "mkdir -p /mnt/nfs/example-project/$CI_COMMIT_REF_NAME/client/master-data/raw/$CI_COMMIT_SHORT_SHA/"

    # 현재 커밋, latest 디렉토리 sync (디렉토리 전체 동기화)
    # 각 디렉토리의 내용을 대상 디렉토리로 바로 복사
    - rsync -avzr --delete --progress csv/ "$DESTINATION_SHA"
    - rsync -avzr --progress json/ "$DESTINATION_SHA"
    # - rsync -avzr --delete --progress csv/ "$DESTINATION_LATEST"  # latest도 사용하는 경우

    # 임시 zip 생성 후 이동
    - ssh deploy@dev-cluster.example.com "cd /mnt/nfs/example-project/$CI_COMMIT_REF_NAME/client/master-data/raw/$CI_COMMIT_SHORT_SHA && zip -r temp.zip . && mv temp.zip ../../zip/$CI_COMMIT_SHORT_SHA.zip"
    # - ssh deploy@dev-cluster.example.com "cd /mnt/nfs/example-project/$CI_COMMIT_REF_NAME/client/master-data/raw/latest && zip -r temp.zip . && mv temp.zip ../../zip/latest.zip"
  tags:
    - build-image
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: on_success
      needs:
        - job: validate_and_update_server
      <<: *change_files
    - if: '$CI_PIPELINE_SOURCE == "web" && $STAGES == "update_client"'
      when: always
