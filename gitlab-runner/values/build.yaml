## GitLab Runner Image
##
## By default it's using registry.gitlab.com/gitlab-org/gitlab-runner:alpine-v{VERSION}
## where {VERSION} is taken from Chart.yaml from appVersion field
##
## ref: https://gitlab.com/gitlab-org/gitlab-runner/container_registry/29383?orderBy=NAME&sort=asc&search[]=alpine-v&search[]=
##
## Note: If you change the image to the ubuntu release
##       don't forget to change the securityContext;
##       these images run on different user IDs.
##
image:
  registry: registry.gitlab.com
  image: gitlab-org/gitlab-runner
  # tag: alpine-v{{.Chart.AppVersion}}

## How many runner pods to launch.
##
replicas: 3

## How many old ReplicaSets for this Deployment you want to retain
revisionHistoryLimit: 5

## The GitLab Server URL (with protocol) that want to register the runner against
## ref: https://docs.gitlab.com/runner/commands/index.html#gitlab-runner-register
##
gitlabUrl: http://gitlab.example.com/

## The Runner Token for adding new Runners to the GitLab Server. This must
## be retrieved from your GitLab instance. It is the token of an already registered runner.
## ref: (we don't have docs for that yet, but we want to use an existing token)
##
runnerToken: "glrt-xxxxxxxxxxxx"

## Configure the maximum number of concurrent jobs
## ref: https://docs.gitlab.com/runner/configuration/advanced-configuration.html#the-global-section
## Lowered from 10 to 5 (2026-05-08) to relieve etcd/apiserver write pressure under CI bursts.
## Lowered from 5 to 3 (2026-05-14) after a single UPGRADE_MODE=tier2 trigger created
## 7 auto-MRs simultaneously and saturated compute-04 (4-core ci-build node) at 117% CPU.
## With 3 controller replicas × concurrent 3 = 9 total build-image slots (was 15),
## resource_group on validate:upgrade_mr already serializes the heavy `make lint` work.
##
concurrent: 3

## Number of seconds until the forceful shutdown operation times out and exits the process.
## ref: https://docs.gitlab.com/runner/configuration/advanced-configuration.html#the-global-section
##
shutdown_timeout: 0

## Defines in seconds how often to check GitLab for new builds
## ref: https://docs.gitlab.com/runner/configuration/advanced-configuration.html#the-global-section
##
checkInterval: 3

## For RBAC support:
rbac:
  ## Specifies whether a Role and RoleBinding should be created
  ## If this value is set to `true`, `serviceAccount.create` should also be set to either `true` or `false`
  ##
  create: true
  ## Define the generated serviceAccountName when create is set to true
  ## It defaults to "gitlab-runner.fullname" if not provided
  ## DEPRECATED: Please use `serviceAccount.name` instead
  generatedServiceAccountName: ""

  ## Define list of rules to be added to the rbac role permissions.
  ## Each rule supports the keys:
  ## - apiGroups: default "" (indicates the core API group) if missing or empty.
  ## - resources: default "*" if missing or empty.
  ## - verbs: default "*" if missing or empty.
  ##
  ## Read more about the recommended rules on the following link
  ##
  ## ref: https://docs.gitlab.com/runner/executors/kubernetes/index.html#configure-runner-api-permissions
  ##
  rules:
    - apiGroups: ["extensions", "apps"]
      resources: ["deployments"]
      verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    - apiGroups: [""]
      resources: ["pods","services","secrets","pods/exec", "serviceaccounts", "pods/attach"]
      verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    # - resources: ["events"]
    #   verbs: ["list", "watch"]
    # - resources: ["namespaces"]
    #   verbs: ["create", "delete"]
    # - resources: ["pods"]
    #   verbs: ["create","delete","get"]
    # - apiGroups: [""]
    #   resources: ["pods/attach","pods/exec"]
    #   verbs: ["get","create","patch","delete"]
    # - apiGroups: [""]
    #   resources: ["pods/log"]
    #   verbs: ["get","list"]
    # - resources: ["secrets"]
    #   verbs: ["create","delete","get","update"]
    # - resources: ["serviceaccounts"]
    #   verbs: ["get"]
    # - resources: ["services"]
    #   verbs: ["create","get"]

  ## Use podSecurity Policy
  ## ref: https://kubernetes.io/docs/concepts/policy/pod-security-policy/
  podSecurityPolicy:
    enabled: true
    resourceNames:
      - gitlab-runner

  ## Specify one or more imagePullSecrets used for pulling the runner image
  ##
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/#add-imagepullsecrets-to-a-service-account
  ##
  ## DEPRECATED: Please use `serviceAccount.imagePullSecrets` instead
  ##
  imagePullSecrets: []

serviceAccount:
  ## Specifies whether a ServiceAccount should be created
  ##
  ## TODO: Set default to `false`
  create: true

## Configuration for the Pods that the runner launches for each new job
##
runners:
  # runner configuration, where the multi line string is evaluated as a
  # template so you can specify helm values inside of it.
  #
  # tpl: https://helm.sh/docs/howto/charts_tips_and_tricks/#using-the-tpl-function
  # runner configuration: https://docs.gitlab.com/runner/configuration/advanced-configuration.html
  config: |
    [[runners]]
      [runners.kubernetes]
        namespace = "{{.Release.Namespace}}"
        image = "alpine"
        # Reduce apiserver GET /pods polling frequency (default 3s) — eases control-plane load.
        poll_interval = 5
        # Tolerate transient apiserver slowdowns without failing the job (default 180s).
        poll_timeout = 600
        # Allow graceful pod termination instead of immediate delete (reduces etcd churn).
        cleanup_grace_period_seconds = 30
        # Pin build pods to k8s-compute-04 (tainted with dedicated=ci-build:NoSchedule + labeled role=ci-build)
        # to isolate buildx/dind disk IO from compute-01/02/03. Deploy runners deliberately omit these so
        # the same NoSchedule taint keeps them on the other nodes.
        [runners.kubernetes.node_selector]
          "role" = "ci-build"
        # Toleration table key uses "<taint-key>=<taint-value>" with the effect as the value.
        # taint dedicated=ci-build:NoSchedule -> "dedicated=ci-build" = "NoSchedule".
        [runners.kubernetes.node_tolerations]
          "dedicated=ci-build" = "NoSchedule"
        # Run service containers (e.g. docker:dind) as privileged so dockerd can mount cgroups.
        # build container itself stays unprivileged (limits build-script blast radius).
        # Required by gitlab-toolchain-images build_custom job (docker buildx multi-arch).
        # Note: top-level `services_privileged` is dropped by `register --template-config`
        # in GitLab Runner 18.11.x. Use the nested security_context table instead — that one is preserved.
        [runners.kubernetes.service_container_security_context]
          privileged = true

  ## DEPRECATED: Specify the tags associated with the runner. Comma-separated list of tags.
  ##
  ## ref: https://docs.gitlab.com/ee/ci/runners/new_creation_workflow.html
  ##
  tags: "build-image"

## Configure securitycontext for the main container
## ref: https://kubernetes.io/docs/concepts/security/pod-security-standards/
##
securityContext:
  allowPrivilegeEscalation: true  # Allow privilege escalation.
  readOnlyRootFilesystem: false   # Allow writes to the root filesystem.
  runAsNonRoot: false             # Allow running as root.
  privileged: true               # Allow running in privileged mode.
  capabilities:
    drop: []                      # Keep all Linux capabilities.
  
persistentVolumes:
  enabled: false

persistentVolumeClaims:
  enabled: false
# =============================================================================
# Prometheus Metrics
# =============================================================================
metrics:
  enabled: true
  podMonitor:
    enabled: true
    namespace: monitoring
    labels:
      release: kube-prometheus-stack
