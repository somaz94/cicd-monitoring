# nfs-server
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-pv-prometheus-server
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-client
  nfs:
    path: /nfs/prometheus-server
    server: <nfs-server-ip>

