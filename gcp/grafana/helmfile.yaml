repositories:
  - name: grafana-community
    url: https://grafana-community.github.io/helm-charts

releases:
  - name: grafana
    namespace: monitoring
    createNamespace: true
    chart: grafana-community/grafana
    version: 11.3.5
    values:
      - values/mgmt.yaml

# Hooks to ensure proper installation and upgrades
hooks:
  - events: ["presync"]
    showlogs: true
    command: "kubectl"
    args:
      - "create"
      - "namespace"
      - "monitoring"
      - "--dry-run=client"
      - "-o"
      - "yaml"
      - "||"
      - "true"
