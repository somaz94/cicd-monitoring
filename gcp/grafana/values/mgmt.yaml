---
replicas: 1

deploymentStrategy:
  type: RollingUpdate

image:
  registry: docker.io
  repository: grafana/grafana

testFramework:
  enabled: true
  image:
    registry: docker.io
    repository: bats/bats
    tag: "v1.4.1"
  imagePullPolicy: IfNotPresent

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  seccompProfile:
    type: RuntimeDefault

downloadDashboardsImage:
  registry: docker.io
  repository: curlimages/curl
  tag: 7.85.0
  sha: ""
  pullPolicy: IfNotPresent

adminUser: admin
adminPassword: exampleAdminPassword

service:
  enabled: true
  type: ClusterIP

serviceMonitor:
  enabled: true
  path: /metrics

# ── Nginx ingress (active) ──
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  path: /
  pathType: Prefix
  hosts:
    - grafana.example.com

# ── GKE Ingress alternative ──
# Requires separate BackendConfig, FrontendConfig, and ManagedCertificate resources.
# See examples/gke-ingress.yaml for the required manifests.
# ingress:
#   enabled: true
#   annotations:
#     kubernetes.io/ingress.global-static-ip-name: "example-gke-grafana-lb-ip"
#     networking.gke.io/managed-certificates: "grafana-certificate"
#     kubernetes.io/ingress.class: "gce"
#     networking.gke.io/v1beta1.FrontendConfig: grafana-frontend-config
#   hosts:
#     - grafana.example.com

# ── HTTPS ingress with cert-manager + Let's Encrypt ──
# Prerequisites:
#   1. Install cert-manager: https://cert-manager.io/docs/installation/
#   2. Create ClusterIssuer (e.g., letsencrypt-issuer)
# Ref: https://github.com/example-user/certmanager-letsencrypt
# ingress:
#   enabled: true
#   ingressClassName: nginx
#   annotations:
#     nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
#     nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
#     cert-manager.io/cluster-issuer: "letsencrypt-issuer"
#   path: /
#   pathType: Prefix
#   hosts:
#     - grafana.example.com
#   tls:
#     - secretName: grafana-tls
#       hosts:
#         - grafana.example.com

resources: {}
#  limits:
#    cpu: 100m
#    memory: 128Mi
#  requests:
#    cpu: 100m
#    memory: 128Mi

# -- Schedule Grafana on specific GKE nodes using nodeSelector.
# nodeSelector:
#   cloud.google.com/gke-nodepool: example-node-pool

# sidecar:
#   datasources:
#     enabled: true

# ── Persistence with Filestore CSI (ReadWriteMany) ──
persistence:
  type: pvc
  enabled: true
  storageClassName: fs-sc
  accessModes:
    - ReadWriteMany
  size: 10Gi
  finalizers:
    - kubernetes.io/pvc-protection

# ── Persistence with PD CSI alternative (ReadWriteOnce) ──
# persistence:
#   type: pvc
#   enabled: true
#   storageClassName: pd-sc
#   accessModes:
#     - ReadWriteOnce
#   size: 10Gi
#   finalizers:
#     - kubernetes.io/pvc-protection

# ── Persistence with NFS alternative (ReadWriteMany) ──
# persistence:
#   type: pvc
#   enabled: true
#   storageClassName: nfs-client
#   accessModes:
#     - ReadWriteMany
#   size: 10Gi
#   finalizers:
#     - kubernetes.io/pvc-protection

initChownData:
  enabled: true
  image:
    registry: docker.io
    repository: library/busybox
    tag: "1.31.1"
    sha: ""
    pullPolicy: IfNotPresent
  resources: {}

