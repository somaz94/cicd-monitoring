---
global:
  clusterDomain: "cluster.local"
  dnsService: "kube-dns"
  dnsNamespace: "kube-system"

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
    - from: "2024-01-01"
      store: tsdb
      index:
        prefix: loki_index_
        period: 24h
      object_store: filesystem
      schema: v13

singleBinary:
  replicas: 1
  # -- Schedule singleBinary on specific GKE nodes using nodeSelector.
  # nodeSelector:
  #   cloud.google.com/gke-nodepool: example-node-pool

  # ── Filestore CSI persistence (active) ──
  persistence:
    enabled: true
    storageClass: "fs-sc"
    accessModes:
      - ReadWriteMany
    size: 10Gi
  # ── PD CSI persistence alternative (ReadWriteOnce) ──
  # persistence:
  #   enabled: true
  #   storageClass: "pd-sc"
  #   accessModes:
  #     - ReadWriteOnce
  #   size: 10Gi
  # ── NFS persistence alternative (ReadWriteMany) ──
  # persistence:
  #   enabled: true
  #   storageClass: "nfs-client"
  #   accessModes:
  #     - ReadWriteMany
  #   size: 10Gi

gateway:
  enabled: true
  # -- Schedule gateway on specific GKE nodes using nodeSelector.
  # nodeSelector:
  #   cloud.google.com/gke-nodepool: example-node-pool
  service:
    type: ClusterIP

  # ── Nginx ingress (active) ──
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - host: loki.somaz.example.com
        paths:
          - path: /
            pathType: Prefix

  # ── GKE Ingress alternative ──
  # Requires separate BackendConfig, FrontendConfig, and ManagedCertificate resources.
  # See examples/gke-ingress.yaml for the required manifests.
  # ingress:
  #   enabled: true
  #   annotations:
  #     kubernetes.io/ingress.global-static-ip-name: "example-gke-loki-lb-ip"
  #     networking.gke.io/managed-certificates: "loki-certificate"
  #     kubernetes.io/ingress.class: "gce"
  #     networking.gke.io/v1beta1.FrontendConfig: loki-frontend-config
  #   hosts:
  #     - host: loki.somaz.example.com
  #       paths:
  #         - path: /
  #           pathType: Prefix

  # ── HTTPS ingress with cert-manager + Let's Encrypt ──
  # Prerequisites:
  #   1. Install cert-manager: https://cert-manager.io/docs/installation/
  #   2. Create ClusterIssuer (e.g., letsencrypt-issuer)
  # Ref: https://github.com/somaz94/certmanager-letsencrypt
  # ingress:
  #   enabled: true
  #   ingressClassName: nginx
  #   annotations:
  #     nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  #     nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  #     cert-manager.io/cluster-issuer: "letsencrypt-issuer"
  #   hosts:
  #     - host: loki.somaz.example.com
  #       paths:
  #         - path: /
  #           pathType: Prefix
  #   tls:
  #     - secretName: loki-gateway-tls
  #       hosts:
  #         - loki.somaz.example.com

chunksCache:
  enabled: false
resultsCache:
  enabled: false
tableManager:
  enabled: false

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

test:
  enabled: false
lokiCanary:
  enabled: false
