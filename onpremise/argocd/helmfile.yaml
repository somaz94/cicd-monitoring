# Deploy Argo CD via helmfile, consuming upstream argo/argo-cd chart.
# Multi-file values split: global / server / redis / notifications.
# Chart version pinned. Bump via ./upgrade.sh after verifying the new release.
# Lifecycle hooks: presync → helm dep update + ensure namespace.

repositories:
  - name: argo
    url: https://argoproj.github.io/argo-helm
  - name: dandydeveloper
    url: https://dandydeveloper.github.io/charts/

releases:
  - name: argocd
    namespace: argocd
    createNamespace: true
    chart: argo/argo-cd
    version: 9.5.15
    values:
      - values/dev.yaml               # global, configs (cm/params/ssh/rbac/secrets), extraObjects
      - values/dev-server.yaml        # controller, dex, server, repoServer, applicationSet
      - values/dev-redis.yaml         # redis, redis-ha, redisSecretInit
      - values/dev-notifications.yaml # notifications controller (Slack templates/triggers)

# helmDefaults:
#   wait: true
#   timeout: 600
#   atomic: true
#   cleanupOnFail: true

# presync hooks: refresh chart deps then ensure namespace exists (idempotent).
hooks:
  # helm dependency update — pulls subchart tarballs declared in Chart.yaml.
  - events: ["presync"]
    showlogs: true
    command: "helm"
    args:
      - "dependency"
      - "update"
      - "."

  # Ensure namespace before sync (kubectl args aren't shell-parsed → use sh -c).
  - events: ["presync"]
    showlogs: true
    command: "sh"
    args:
      - "-c"
      - "kubectl create namespace argocd 2>/dev/null || true"
