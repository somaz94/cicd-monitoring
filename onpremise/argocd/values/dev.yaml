global:
  # -- Default domain used by all components
  ## Used for ingresses, certificates, SSO, notifications, etc.
  domain: argocd.example.com

configs:
  cm:
    # Reconciliation timeout setting (default: 180s).
    # Prevents reconciliation loop resets when many apps can't complete sync within timeout.
    timeout.reconciliation: 600s
    # Hard reconciliation timeout (default: 0s, disabled).
    # Setting to 0 prevents forced termination of reconciliation operations.
    timeout.hard.reconciliation: 0s
    # =============================================================================
    # SSO — Keycloak OpenID Connect (Phase 6, 2026-04-29+)
    #
    # ArgoCD dex talks OIDC to Keycloak `example` realm `argocd` client.
    # Keycloak brokers GitLab as IdP — user credentials remain GitLab.
    # group claim names (`server`, `global-admin`) unchanged → policy.csv below stays untouched.
    # insecureSkipVerify: bypass wildcard self-signed cert trust (until cert-manager).
    # Migration procedure: security/keycloak/docs/argocd-migration.md
    # =============================================================================
    dex.config: |
      connectors:
        - type: oidc
          id: keycloak
          name: Keycloak
          config:
            issuer: https://auth.example.com/realms/example
            clientID: argocd
            clientSecret: G821cLHAGckf46ZP8VIynmvpL5EO1vVT
            redirectURI: https://argocd.example.com/api/dex/callback
            # scopes intentionally omitted — uses dex default (openid + profile + email).
            # The `example` realm has no separate `groups` client-scope; the argocd client's
            # direct protocol-mapper (oidc-group-membership-mapper) injects the groups claim
            # into the token, so requesting it as a scope is unnecessary. Specifying scopes:
            # [openid groups] would be rejected by Keycloak (`Invalid scopes: ...` — groups
            # is unknown, openid is duplicated by dex's auto-prepend).
            insecureSkipVerify: true
            # Keycloak's default mapper config does not put groups claim into the ID token;
            # it is only returned by the userinfo endpoint → make dex hit userinfo to retrieve
            # groups. Without this, the ArgoCD JWT's groups claim becomes [], breaking
            # policy.csv `g, server, ...` matching → no permissions → infinite loading.
            getUserInfo: true
            # dex's oidc connector ignores the groups claim by default (security default).
            # When enabled, dex forwards the upstream's groups claim into the ArgoCD JWT.
            # Without this, dex shows groups=[] in logs even when the Keycloak token contains
            # groups: [server], breaking RBAC matching.
            insecureEnableGroups: true

    # -----------------------------------------------------------------------------
    # Legacy: GitLab-direct dex connector (pre-Phase 6) — preserved for rollback only.
    # -----------------------------------------------------------------------------
    # Until 2026-04-29 ArgoCD used GitLab directly as dex connector.
    # Rollback: swap the oidc block above with the GitLab block below + re-enable dex.gitlab.* secrets.
    #
    # dex.config: |
    #   connectors:
    #     - type: gitlab
    #       id: gitlab
    #       name: GitLab
    #       config:
    #         baseURL: http://gitlab.example.com
    #         clientID: <GITLAB_CLIENT_ID>
    #         clientSecret: <GITLAB_CLIENT_SECRET>
    #         redirectURI: https://argocd.example.com/api/dex/callback
    #         groups:
    #           - server
  params:
    create: true
    server.insecure: true
    # Repo server timeout (default: 60s).
    # Increased timeout needed for large repository synchronization.
    server.repo.server.timeout.seconds: "180"
    # Controller timeout for fetching manifests from repo server (default: 60s).
    # Increase this value when "Context deadline exceeded" errors occur.
    controller.repo.server.timeout.seconds: "180"
    # Number of status reconciliation processors (default: 20).
    # Improves app status checking speed (Synced, Health, OutOfSync, etc.).
    controller.status.processors: "600"
    # Number of operation processors (default: 10).
    # Improves parallel processing of sync operations.
    controller.operation.processors: "300"
    # Kubectl parallel execution limit (default: 20).
    # Increases concurrent kubectl apply operations for faster deployments.
    controller.kubectl.parallelism.limit: "100"
    # Controller sharding algorithm (default: legacy).
    # Round-robin provides balanced workload distribution across replicas.
    controller.sharding.algorithm: "round-robin"
    # Repo server parallelism limit (default: 0, unlimited).
    # Unlimited can cause OOMKilled or slow manifest generation.
    reposerver.parallelism.limit: "100"
  # SSH known hosts for Git repositories
  ## Ref: https://argo-cd.readthedocs.io/en/stable/operator-manual/declarative-setup/#ssh-known-host-public-keys
  ssh:
    # -- Additional known hosts for private repositories
    extraHosts: |
      gitlab.example.com ssh-rsa <GITLAB_SSH_RSA_PUBLIC_KEY>
      gitlab.example.com ecdsa-sha2-nistp256 <GITLAB_SSH_ECDSA_PUBLIC_KEY>
      gitlab.example.com ssh-ed25519 <GITLAB_SSH_ED25519_PUBLIC_KEY>
  # Add RBAC settings
  rbac:
    create: true
    # Use email + groups for RBAC matching (default uses only 'sub' claim from dex)
    scopes: '[email, groups]'
    policy.csv: |
      # ── Global Admin  ──
      # Full access to all resources across all projects
      p, role:global-admin, applications, *, */*, allow
      p, role:global-admin, clusters, *, *, allow
      p, role:global-admin, repositories, *, *, allow
      p, role:global-admin, projects, *, *, allow
      p, role:global-admin, logs, get, *, allow
      p, role:global-admin, exec, create, */*, allow
      p, role:global-admin, certificates, *, *, allow
      p, role:global-admin, accounts, *, *, allow
      p, role:global-admin, gpgkeys, *, *, allow
      g, admin@example.com, role:global-admin

      # ── Server Group ──
      # Common permissions for server group
      p, role:server-admin, clusters, get, *, allow
      p, role:server-admin, repositories, get, *, allow
      p, role:server-admin, certificates, get, *, allow
      p, role:server-admin, gpgkeys, get, *, allow

      # ExampleProject — full access
      p, role:server-admin, applications, *, example-project/*, allow
      p, role:server-admin, projects, get, example-project, allow
      p, role:server-admin, logs, get, example-project/*, allow
      p, role:server-admin, exec, create, example-project/*, allow

      # SecondaryProject — full access
      p, role:server-admin, applications, *, secondary-project/*, allow
      p, role:server-admin, projects, get, secondary-project, allow
      p, role:server-admin, logs, get, secondary-project/*, allow
      p, role:server-admin, exec, create, secondary-project/*, allow

      # ── Add new projects below ──
      # p, role:server-admin, applications, *, <project>/*, allow
      # p, role:server-admin, projects, get, <project>, allow
      # p, role:server-admin, logs, get, <project>/*, allow
      # p, role:server-admin, exec, create, <project>/*, allow

      g, server, role:server-admin
  
  # NOTE (2026-04-29 Phase 6 cutover): argo-cd chart 9.x reads only configs.secret.extra.<key> path —
  # the legacy `secrets:` block below is ignored. So dex client secret is inlined as plaintext in
  # dex.config above (same convention as the previous GitLab era). This block is unused.
  secrets:
    # Legacy dex.* secrets — old path not recognized by chart 9.x; replaced by plaintext inline.
    # dex.keycloak.clientSecret: "G821cLHAGckf46ZP8VIynmvpL5EO1vVT"
    # dex.gitlab.clientId: "<GITLAB_CLIENT_ID>"
    # dex.gitlab.clientSecret: "<GITLAB_CLIENT_SECRET>"

# =============================================================================
# Extra K8s manifests rendered by the chart (templates/extra-manifests.yaml).
#
# Phase 6 (2026-04-29+) — sibling HTTPRoute for HTTP→HTTPS 301 redirect.
# argo-cd chart's server.httproute renders a single HTTPRoute → inject the redirect
# sibling via extraObjects to integrate with the helm chart lifecycle (install/upgrade/uninstall handled automatically).
# Different from Harbor (manifests/+postsync hook) — same as vaultwarden (extraObjects inline).
# =============================================================================
extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: argocd-https-redirect
      namespace: argocd
    spec:
      parentRefs:
        - name: ngf
          namespace: nginx-gateway
          sectionName: http
      hostnames:
        - argocd.example.com
      rules:
        - filters:
            - type: RequestRedirect
              requestRedirect:
                scheme: https
                statusCode: 301
