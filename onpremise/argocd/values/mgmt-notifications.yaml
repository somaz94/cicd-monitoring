  triggers:
    # Fires on successful sync + Healthy state; dedup per sync operation to avoid duplicate alerts during rolling updates
    trigger.on-deployed: |
      - description: Application is synced and healthy after any operation.
        send:
        - app-deployed
        when: |
          app.status.operationState.phase == 'Succeeded' and
          app.status.health.status == 'Healthy' and
          app.status.operationState != null
        oncePer: app.status.operationState.finishedAt

    # Fires on Degraded health, excluding transient Degraded during sync (3min buffer after sync finish); dedup per sync operation
    trigger.on-health-degraded: |
      - description: Application has degraded (not due to sync)
        send:
        - app-health-degraded
        when: |
          app.status.health.status == 'Degraded' and
          (app.status.operationState == nil or
           (app.status.operationState.phase in ['Succeeded', 'Failed', 'Error'] and
            app.status.operationState.finishedAt != nil and
            time.Now().Sub(time.Parse(app.status.operationState.finishedAt)).Minutes() > 3))
        oncePer: app.status.operationState.finishedAt

    # Fires once per failed sync operation (dedup by finishedAt timestamp)
    trigger.on-sync-failed: |
      - description: Application syncing has failed
        send:
        - app-sync-failed
        when: app.status.operationState.phase in ['Error', 'Failed']
        oncePer: app.status.operationState.finishedAt

    # Fires on OutOfSync, excluding freshly-created apps (<5min) and post-sync settling window (<60s); dedup per git revision
    trigger.on-sync-status-out-of-sync: |
      - description: Application sync status is 'OutOfSync'
        send:
        - app-sync-status-out-of-sync
        when: |
          app.status.sync.status == 'OutOfSync' and
          app.status.health.status not in ['Progressing', 'Healthy'] and
          (app.metadata.creationTimestamp == null or
            time.Now().Sub(time.Parse(app.metadata.creationTimestamp)).Minutes() > 5) and
          ((app.status.operationState == null) or
          (app.status.operationState != null and
            app.status.operationState.phase != 'Running' and
            app.status.operationState.finishedAt != null and
            time.Now().Sub(time.Parse(app.status.operationState.finishedAt)).Seconds() > 60))
        oncePer: app.status.sync.revision

    # Fires on Missing health; dedup per reconcile cycle
    trigger.on-health-missing: |
      - description: Application health status is missing
        send:
        - app-health-missing
        when: app.status.health.status == 'Missing'
        oncePer: app.status.reconciledAt

    # Fires when app restarts unrelated to sync (3min buffer after sync finish) — detects crash/drain/manual rollout; dedup per sync operation to avoid repeated alerts while health stays Progressing
    trigger.on-restarted: |
      - description: Application has been restarted (not due to sync)
        send:
        - app-restarted
        when: |
          app.status.health.status == 'Progressing' and
          (app.status.operationState == nil or
           (app.status.operationState.phase in ['Succeeded', 'Failed', 'Error'] and
            app.status.operationState.finishedAt != nil and
            time.Now().Sub(time.Parse(app.status.operationState.finishedAt)).Minutes() > 3))
        oncePer: app.status.operationState.finishedAt

    # Fires on Unknown health; dedup per reconcile cycle
    trigger.on-health-unknown: |
      - description: Application health status is unknown
        send:
        - app-health-unknown
        when: app.status.health.status == 'Unknown'
        oncePer: app.status.reconciledAt

    # trigger.test-notification: |
    #   - description: Test notification - when application is healthy
    #     send:
    #     - app-healthy
    #     when: "true"  # Always triggered
  
  # Current mode: Option B — notifications handles all events incl. health state.
  # Alertmanager covers only ArgoCDControllerReconcileStuck (root-cause of 2026-04-23 stuck).
  # Option A (optional): move Degraded/Missing/Unknown to Alertmanager for auto-RESOLVED,
  #   silencing, and inhibit rules. To switch to A:
  #     1) comment out the 3 triggers below (on-health-degraded/missing/unknown)
  #     2) enable the 3 commented-out alerts in observability/.../mgmt-alerts.yaml
  #     3) enable the ArgoCD inhibit_rule in observability/.../mgmt-alertmanager.yaml
  #   See cicd/argo-cd/docs/ghost-alarm-incident-2026-04-23.md - final architecture section
  subscriptions:
    - recipients:
      - slack:#argocd-alarm
      triggers:
      - on-deployed
      - on-sync-failed
      - on-sync-status-out-of-sync
      - on-restarted
      - on-health-degraded   # A: comment out when moving to Alertmanager
      - on-health-missing    # A: comment out when moving to Alertmanager
      - on-health-unknown    # A: comment out when moving to Alertmanager
      # - test-notification
