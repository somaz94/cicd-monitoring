## Notifications controller
notifications:
  # -- Enable notifications controller
  enabled: true

  secret:
    create: true
    items:
      slack-token: "xoxb-your-slack-bot-token"
  
  notifiers:
    service.slack: |
      token: $slack-token
      username: ArgoCD
      icon: https://argo-cd.readthedocs.io/en/stable/assets/logo.png
      channel: "#argocd-alarm"
  
  templates:
    template.app-deployed: |
      message: |
        :white_check_mark: Application {{.app.metadata.name}} has been deployed successfully.
      slack:
        attachments: |
          [{
            "title": "{{ .app.metadata.name}} - Deployment Succeeded",
            "title_link":"{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
            "color": "#18be52",
            "fields": [
            {
              "title": "Sync Status",
              "value": "{{.app.status.sync.status}}",
              "short": true
            },
            {
              "title": "App Health",
              "value": "{{.app.status.health.status}}",
              "short": true
            },
            {
              "title": "Namespace",
              "value": "{{.app.spec.destination.namespace}}",
              "short": true
            },
            {
              "title": "Deployed At",
              "value": "{{.app.status.operationState.finishedAt}} (UTC+9=KST)",
              "short": true
            },
            {
              "title": "Destination Server",
              "value": "{{.app.spec.destination.server}}",
              "short": true
            },
            {
              "title": "Details",
              "value": "<{{.context.argocdUrl}}/applications/{{.app.metadata.name}}|View in Argo CD>",
              "short": false
            }
            ]
          }]
    
    template.app-health-degraded: |
