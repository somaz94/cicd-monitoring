# Deploy prometheus-mysql-exporter via helmfile, consuming upstream prometheus-community chart.
# One release per project; copy the block below + create a new values file for additional projects.
# Chart version pinned. Bump via ./upgrade.sh after verifying the new release.

repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

releases:
  - name: example-project-mysql-exporter
    chart: prometheus-community/prometheus-mysql-exporter
    namespace: monitoring
    version: 2.13.1
    values:
      - values/example-project.yaml
