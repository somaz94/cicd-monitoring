# yaml-language-server: $schema=
# =============================================================================
# Alert Rules — disable built-in duplicates + custom PrometheusRule definitions
#
# severity levels:
#   critical — immediate action required (Pod crash, disk 95%+)
#   warning  — investigate soon (high CPU/memory, disk 80%+)
#
# key fields:
#   expr   — PromQL expression that triggers the alert
#   for    — how long the condition must be true before firing
#   labels — severity, used for Slack routing and inhibit rules
# =============================================================================

# -----------------------------------------------------------------------------
# Default Rules — disable built-in alerts that duplicate custom rules
# -----------------------------------------------------------------------------
defaultRules:
  disabled:
    # Pod lifecycle — replaced by custom PodCrashLooping (critical) / PodNotReady
    KubePodCrashLooping: true
    KubePodNotReady: true
    # Filesystem space — replaced by custom DiskSpaceRunningLow / DiskSpaceCritical
    NodeFilesystemAlmostOutOfSpace: true
    NodeFilesystemSpaceFillingUp: true
    # Filesystem inodes — replaced by custom NodeFilesystemInodesRunningLow / Critical
    NodeFilesystemAlmostOutOfFiles: true
    NodeFilesystemFilesFillingUp: true
    # Network errors — replaced by custom NodeNetworkErrors (combined RX+TX)
    NodeNetworkReceiveErrs: true
    NodeNetworkTransmitErrs: true

# -----------------------------------------------------------------------------
# Custom PrometheusRule groups
# -----------------------------------------------------------------------------
additionalPrometheusRulesMap:

  # ---------------------------------------------------------------------------
  # Node Alerts — K8s nodes + physical servers (via node-exporter)
  # ---------------------------------------------------------------------------
  node-alerts:
    groups:
      - name: node-alerts
        rules:

          # CPU usage > 85% for 5 minutes
          # Calculates: 100% - idle CPU percentage (averaged per instance over 5m window)
          - alert: HighCPUUsage
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on {{ $labels.instance }}"
              description: "CPU usage is above 85% for 5 minutes (current: {{ $value }}%)"

          # Memory usage > 85% for 5 minutes
          # Calculates: (total - available) / total * 100
          - alert: HighMemoryUsage
            expr: (1 - (node_memory_AvailableBytes / node_memory_MemTotalBytes)) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.instance }}"
              description: "Memory usage is above 85% for 5 minutes (current: {{ $value }}%)"

          # Disk usage > 80% for 10 minutes (warning)
          # Excludes tmpfs and overlay filesystems (container ephemeral storage)
          - alert: DiskSpaceRunningLow
            expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 80
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Disk space running low on {{ $labels.instance }}"
              description: "Disk usage is above 80% on {{ $labels.mountpoint }} (current: {{ $value }}%)"

          # Disk usage > 95% for 5 minutes (critical — immediate action needed)
          - alert: DiskSpaceCritical
            expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 95
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Disk space critical on {{ $labels.instance }}"
              description: "Disk usage is above 95% on {{ $labels.mountpoint }} (current: {{ $value }}%)"

          # Filesystem inodes > 80% used for 10 minutes (warning)
          # Many small files can exhaust inodes even with free disk space
          - alert: NodeFilesystemInodesRunningLow
            expr: (1 - (node_filesystem_files_free{fstype!~"tmpfs|overlay"} / node_filesystem_files{fstype!~"tmpfs|overlay"})) * 100 > 80
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Filesystem inodes running low on {{ $labels.instance }}"
              description: "Inode usage is above 80% on {{ $labels.mountpoint }} (current: {{ $value }}%)"

          # Filesystem inodes > 95% used for 5 minutes (critical)
          # Almost no inodes left — new file creation will fail
          - alert: NodeFilesystemInodesCritical
            expr: (1 - (node_filesystem_files_free{fstype!~"tmpfs|overlay"} / node_filesystem_files{fstype!~"tmpfs|overlay"})) * 100 > 95
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Filesystem inodes critical on {{ $labels.instance }}"
              description: "Inode usage is above 95% on {{ $labels.mountpoint }} (current: {{ $value }}%)"

          # Network RX/TX errors increasing for 5 minutes
          # Sustained network errors indicate cable, driver, or NIC problems
          - alert: NodeNetworkErrors
            expr: (rate(node_network_receive_errs_total[5m]) + rate(node_network_transmit_errs_total[5m])) > 10
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Network errors detected on {{ $labels.instance }}"
              description: "Interface {{ $labels.device }} has {{ $value }} errors/sec (RX+TX combined over 5m)"

          # 5-minute load average exceeds 2x CPU count for 10 minutes
          # Indicates system is overloaded — processes are waiting for CPU
          - alert: NodeHighSystemLoad
            expr: node_load5 / count without(cpu, mode) (node_cpu_seconds_total{mode="idle"}) > 2
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High system load on {{ $labels.instance }}"
              description: "5-minute load average is {{ $value }}x the number of CPUs"

          # Network interface toggling up/down (carrier changes)
          # Frequent carrier changes suggest unstable link (bad cable, switch port)
          - alert: NodeNetworkInterfaceFlapping
            expr: changes(node_network_carrier{device!~"veth.*|lxc.*|cali.*|flannel.*|cni.*"}[10m]) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Network interface flapping on {{ $labels.instance }}"
              description: "Interface {{ $labels.device }} changed carrier state {{ $value }} times in 10 minutes"

  # ---------------------------------------------------------------------------
  # Pod Alerts — K8s workload health
  # ---------------------------------------------------------------------------
  pod-alerts:
    groups:
      - name: pod-alerts
        rules:

          # Pod restarting repeatedly (CrashLoopBackOff)
          # Checks if restart count increased in the last 15 minutes
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
              description: "Pod has been restarting frequently in the last 15 minutes"

          # Pod not ready for 10 minutes (stuck in init, image pull, or probe failure)
          # Excludes Completed/Succeeded Pods (e.g., CronJob backup Pods) to prevent false alerts
          - alert: PodNotReady
            expr: kube_pod_status_ready{condition="true"} == 0 unless on(namespace, pod) kube_pod_status_phase{phase=~"Succeeded|Failed"} == 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
              description: "Pod has been in not-ready state for 10 minutes"

  # ---------------------------------------------------------------------------
  # Cilium Alerts — CNI health and network policy enforcement
  # ---------------------------------------------------------------------------
  cilium-alerts:
    groups:
      - name: cilium-alerts
        rules:

          # Cilium endpoints not in "ready" state for 10 minutes
          # Non-ready endpoints cannot send or receive traffic via Cilium
          - alert: CiliumEndpointNotReady
            expr: sum by(instance) (cilium_endpoint_state{endpoint_state!="ready"}) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Cilium endpoints not ready on {{ $labels.instance }}"
              description: "{{ $value }} endpoints are in non-ready state for 10 minutes"

          # Cilium packet drop rate > 50/sec for 5 minutes
          # High drop rates may indicate policy misconfiguration or network issues
          - alert: CiliumDropRateHigh
            expr: sum by(instance, reason) (rate(cilium_drop_count_total[5m])) > 50
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High Cilium packet drop rate on {{ $labels.instance }}"
              description: "Cilium is dropping {{ $value }} packets/sec (reason: {{ $labels.reason }})"

          # Cilium agent reports unhealthy status for 5 minutes (critical)
          # An unhealthy agent cannot enforce network policies
          - alert: CiliumAgentUnhealthy
            expr: cilium_agent_unhealthy > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Cilium agent unhealthy on {{ $labels.instance }}"
              description: "Cilium agent has been reporting unhealthy status for 5 minutes"

          # Cilium operator is down — no running operator process detected for 5 minutes
          # The operator manages CiliumIdentity, CiliumEndpoint CRDs and IP allocation
          - alert: CiliumOperatorDown
            expr: absent(cilium_operator_process_start_time_seconds)
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Cilium operator is down"
              description: "No Cilium operator process detected for 5 minutes — CRD management and IP allocation are halted"

  # ---------------------------------------------------------------------------
  # ArgoCD Alerts — controller-level health (Option B, active)
  #
  # Current mode: Option B
  #   - Only ArgoCDControllerReconcileStuck is active (root-cause alert for 2026-04-23 incident).
  #   - App-level health alerts (Degraded/Missing/OutOfSync) remain in ArgoCD notifications
  #     (cicd/argo-cd/values/mgmt-notifications.yaml, #argocd-alarm channel).
  #
  # Option A (optional): also move app-level health to Alertmanager.
  #   Benefits: auto-RESOLVED alerts (send_resolved=true), silencing, inhibit rules.
  #   To switch to A:
  #     1) uncomment the 3 alerts below (ArgoCDAppDegraded/Missing/OutOfSync)
  #     2) comment out the 3 triggers in cicd/argo-cd/values/mgmt-notifications.yaml
  #        (on-health-degraded/missing/unknown in subscriptions)
  #     3) uncomment the ArgoCD inhibit_rule in mgmt-alertmanager.yaml
  #   See cicd/argo-cd/docs/ghost-alarm-incident-2026-04-23.md - final architecture section
  # ---------------------------------------------------------------------------
  argocd-alerts:
    groups:
      - name: argocd-alerts
        rules:

          # --- Active rules (Option B) ---

          # Controller reconcile stuck — early detection of the 2026-04-23 incident pattern
          # Normal reconcile interval is 3-10 min (timeout.reconciliation=600s); 30 min silence is abnormal
          #
          # The `time() - timestamp(...) < 300` clause filters out stale series from
          # recently-deleted pods (pod restarts leave old instance IPs in Prometheus
          # for ~5 min with counter frozen, which would otherwise cause false firing).
          - alert: ArgoCDControllerReconcileStuck
            expr: |
              (increase(argocd_app_reconcile_count[30m]) == 0)
              and ((time() - timestamp(argocd_app_reconcile_count)) < 300)
            for: 10m
            labels:
              severity: critical
              group: argocd
            annotations:
              summary: "ArgoCD application-controller reconcile stuck (no activity 30+ min)"
              description: "No reconcile activity for 30+ minutes (expected 3-10 min interval). Controller may have work queue

          # --- Option A rules (disabled by default) ---
          # Uncomment the block below to enable Option A (move app-level health to Alertmanager)

          # # App Degraded for 5 minutes
          # - alert: ArgoCDAppDegraded
          #   expr: argocd_app_info{health_status="Degraded"} == 1
          #   for: 5m
          #   labels:
          #     severity: warning
          #     group: argocd
          #   annotations:
          #     summary: "ArgoCD app {{ $labels.name }} is Degraded"
          #     description: "Application {{ $labels.name }} (project: {{ $labels.project }}, dest: {{ $labels.dest_namespace }}) has been Degraded for 5+ minutes."
          #
          # # App resources Missing for 10 minutes
          # - alert: ArgoCDAppMissing
          #   expr: argocd_app_info{health_status="Missing"} == 1
          #   for: 10m
          #   labels:
          #     severity: warning
          #     group: argocd
          #   annotations:
          #     summary: "ArgoCD app {{ $labels.name }} is Missing"
          #     description: "Application {{ $labels.name }} has Missing resources for 10+ minutes — expected resources are not present on the cluster."
          #
          # # App OutOfSync for 30 minutes — likely auto-sync disabled or failing
          # - alert: ArgoCDAppOutOfSync
          #   expr: argocd_app_info{sync_status="OutOfSync"} == 1
          #   for: 30m
          #   labels:
          #     severity: warning
          #     group: argocd
          #   annotations:
          #     summary: "ArgoCD app {{ $labels.name }} OutOfSync for 30+ min"
          #     description: "Application {{ $labels.name }} has been OutOfSync for 30+ minutes. Auto-sync may be disabled or failing — investigate in ArgoCD UI."
