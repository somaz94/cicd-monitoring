# yaml-language-server: $schema=
# =============================================================================
# kube-prometheus-stack Custom Values — base infrastructure
#
# Component layout across values files:
#   mgmt.yaml          — Grafana, Prometheus, node-exporter, kube-state-metrics
#   alertmanager.yaml  — Alertmanager routing, inhibit_rules, Slack receiver
#   alerts.yaml        — defaultRules.disabled + custom PrometheusRule groups
# =============================================================================

# =============================================================================
# Grafana
# =============================================================================
grafana:
  enabled: true
  adminPassword: "exampleAdminPassword"  # TODO: Change this to a secure password

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Ingress disabled after Phase 6 cutover (2026-04-17) — NGF owns .55. grafana.route(below) is sole path.
  ingress:
    enabled: false
    ingressClassName: nginx
    hosts:
      - grafana.example.com
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.example.com

  # Gateway API HTTPRoute — Phase 3 (ingress-nginx → NGF) parallel rollout
  # - grafana subchart natively supports the route: block (charts/grafana/templates/route.yaml)
  # - Only matches specified → chart auto-wires backend to grafana Service (port 80)
  route:
    main:
      enabled: true
      parentRefs:
        - name: ngf
          namespace: nginx-gateway
      hostnames:
        - grafana.example.com
      matches:
        - path:
            type: PathPrefix
            value: /

  # Persistent storage for dashboards and settings
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: nfs-client-server

  # Default dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: Asia/Seoul

  # Additional data sources (uncomment when Loki is enabled)
  # additionalDataSources:
  #   - name: Loki
  #     type: loki
  #     url: http://loki-gateway.monitoring.svc.example-cluster.local:80
  #     access: proxy
  #     isDefault: false

# =============================================================================
# Prometheus
# =============================================================================
prometheus:
  # Ingress disabled after Phase 6 cutover (2026-04-17) — NGF owns .55. prometheus.route(below) is sole path.
  ingress:
    enabled: false
    ingressClassName: nginx
    hosts:
      - prometheus.example.com
    # tls:
    #   - secretName: prometheus-tls
    #     hosts:
    #       - prometheus.example.com

  # Gateway API HTTPRoute — Phase 3 (ingress-nginx → NGF) parallel rollout
  # - upstream chart natively supports the route: block (templates/prometheus/route.yaml)
  # - Only matches specified → chart auto-wires backend to prometheus Service (port 9090)
  route:
    main:
      enabled: true
      parentRefs:
        - name: ngf
          namespace: nginx-gateway
      hostnames:
        - prometheus.example.com
      matches:
        - path:
            type: PathPrefix
            value: /

  prometheusSpec:
    # Resources
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Retention period
    retention: 15d

    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-client-server
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    # Scrape external targets (physical servers, VMs)
    # Install node-exporter on each server: https://github.com/prometheus/node_exporter
    additionalScrapeConfigs:
      - job_name: "physical-servers"
        scrape_interval: 30s
        static_configs:
          - targets:
              - "192.168.1.10:9100"  # server1
              - "192.168.1.12:9100"  # server2
              - "192.168.1.20:9100"  # server3
              - "192.168.1.15:9100"  # server4
            labels:
              env: "physical"
              group: "on-premise"

      - job_name: "virtual-machines"
        scrape_interval: 30s
        static_configs:
          - targets:
              - "192.168.1.60:9100"  # gitlab
            labels:
              env: "vm"
              group: "on-premise"

    # Cilium metrics (no ServiceMonitor — scrape via kubernetes_sd_configs)
      - job_name: "cilium-agent"
        scrape_interval: 30s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - kube-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_k8s_app]
            regex: cilium
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:9962

      - job_name: "cilium-operator"
        scrape_interval: 30s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - kube-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_name]
            regex: cilium-operator
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:9963

    # ServiceMonitor selector - pick up all ServiceMonitors in monitoring namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# =============================================================================
# Kube Proxy (disabled — Cilium replaces kube-proxy)
# =============================================================================
kubeProxy:
  enabled: false

# =============================================================================
# Node Exporter (for K8s nodes - auto deployed via DaemonSet)
# =============================================================================
nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

# =============================================================================
# Kube State Metrics (K8s object metrics - Pod, Deployment, etc.)
# =============================================================================
kubeStateMetrics:
  enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
