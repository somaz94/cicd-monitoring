repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

releases:
  - name: kube-prometheus-stack
    chart: prometheus-community/kube-prometheus-stack
    namespace: monitoring
    version: 83.4.3
    values:
      - values/mgmt.yaml               # Grafana, Prometheus, node-exporter, kube-state-metrics
      - values/mgmt-alertmanager.yaml  # Alertmanager routing, inhibit_rules, Slack receiver
      - values/mgmt-alerts.yaml        # defaultRules.disabled + custom PrometheusRule groups

hooks:
  - events: ["presync"]
    showlogs: true
    command: "kubectl"
    args:
      - "create"
      - "namespace"
      - "monitoring"
      - "--dry-run=client"
      - "-o"
      - "yaml"
      - "||"
      - "true"
