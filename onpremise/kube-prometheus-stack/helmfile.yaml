# Deploy kube-prometheus-stack (Prometheus + Grafana + Alertmanager + node-exporter + kube-state-metrics)
# via helmfile, consuming upstream prometheus-community chart.
# Multi-file values split: core / alertmanager / alerts.
# Chart version pinned. Bump via ./upgrade.sh after verifying the new release.

repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

releases:
  - name: kube-prometheus-stack
    chart: prometheus-community/kube-prometheus-stack
    namespace: monitoring
    version: 85.2.0
    values:
      - values/dev.yaml               # Grafana, Prometheus, node-exporter, kube-state-metrics
      - values/dev-alertmanager.yaml  # Alertmanager routing, inhibit_rules, Slack receiver
      - values/dev-alerts.yaml        # defaultRules.disabled + custom PrometheusRule groups

# Ensure namespace before sync (idempotent no-op when present).
# kubectl args aren't shell-parsed → use sh -c to evaluate || true.
hooks:
  - events: ["presync"]
    showlogs: true
    command: "sh"
    args:
      - "-c"
      - "kubectl create namespace monitoring 2>/dev/null || true"
