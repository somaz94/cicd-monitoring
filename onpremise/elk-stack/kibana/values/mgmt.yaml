---
elasticsearchHosts: "https://elasticsearch-master:9200"
elasticsearchCertificateSecret: elasticsearch-master-certs
elasticsearchCertificateAuthoritiesFile: ca.crt
elasticsearchCredentialSecret: elasticsearch-master-credentials

replicas: 1

image: "docker.elastic.co/kibana/kibana"
imageTag: "8.5.1"
imagePullPolicy: "IfNotPresent"

resources:
  requests:
    cpu: "100m"
    memory: "2Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

protocol: http

serverHost: "0.0.0.0"

healthCheckPath: "/app/kibana"

updateStrategy:
  type: "Recreate"

service:
  type: ClusterIP
  loadBalancerIP: ""
  port: 5601
  nodePort: ""
  labels: {}
  annotations: {}
  loadBalancerSourceRanges: []
  httpPortName: http

# ── HTTP ingress (active) ──
ingress:
  enabled: true
  className: "nginx"
  pathtype: ImplementationSpecific
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
  hosts:
    - host: kibana.example.com
      paths:
        - path: /

# ── HTTPS ingress with cert-manager + Let's Encrypt ──
# Prerequisites:
#   1. Install cert-manager: https://cert-manager.io/docs/installation/
#   2. Create ClusterIssuer (e.g., cloudflare-issuer)
# cert-manager auto-creates Certificate & TLS Secret via ingress annotation.
# Ref: https://github.com/example-user/certmanager-letsencrypt
#
# ingress:
#   enabled: true
#   className: "nginx"
#   pathtype: ImplementationSpecific
#   annotations:
#     nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
#     cert-manager.io/cluster-issuer: "cloudflare-issuer"
#   hosts:
#     - host: kibana.example.com
#       paths:
#         - path: /
#   tls:
#     - secretName: kibana-tls
#       hosts:
#         - kibana.example.com
