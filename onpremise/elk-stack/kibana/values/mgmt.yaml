---
# Kibana CR values — rendered by templates/kibana.yaml
# The ECK operator watches this CR and reconciles a Deployment/Service.

# CR name determines all downstream resource names:
#   - Service: <name>-kb-http (port 5601)
#   - Secret (HTTP certs): <name>-kb-http-certs-public
#   - Deployment: <name>-kb
name: kibana

# Elastic Stack version — must match (or be compatible with) the linked Elasticsearch CR.
version: "9.3.3"

replicas: 1

# Elasticsearch CR to connect to. ECK auto-injects:
#   - elasticsearch.hosts
#   - elasticsearch.username / password
#   - elasticsearch.ssl.certificateAuthorities
elasticsearchRef:
  name: elasticsearch

# Node.js runtime flags passed via NODE_OPTIONS. Rendered as space-joined
# string at deploy time — add additional flags as separate list entries.
nodeOptions:
  - "--max-old-space-size=1800"

resources:
  requests:
    cpu: "100m"
    memory: "2Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

# TLS on the Kibana pod's http endpoint (the 5601 port the ingress backends to).
#   tls.enabled: false → ECK self-signed cert disabled, pod serves plain HTTP.
#     publicBaseUrl becomes http://..., session cookies non-Secure → HTTP login
#     works against the ingress. Ingress annotation `backend-protocol` must be
#     HTTP in this mode.
#   tls.enabled: true  → pod serves HTTPS (ECK self-signed by default),
#     publicBaseUrl https://..., Secure cookies. Ingress `backend-protocol`
#     must be HTTPS. Intended for cert-manager wired deployments (option C).
tls:
  enabled: false

# Ingress disabled after Phase 6 cutover (2026-04-17) — NGF owns .55. HTTPRoute(below) is sole path.
# `backend-protocol` annotation kept for rollback reference; aligns with tls.enabled switch.
ingress:
  enabled: false
  className: nginx
  host: kibana.example.com
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"

# Gateway API HTTPRoute — Phase 3 (ingress-nginx → NGF) parallel deployment
# - Temporary IP: 192.168.1.69 (ngf Gateway), swap to .55 at Phase 6 cutover
# - When backendRefs name is omitted, defaults to `<name>-kb-http`; when port is omitted, defaults to 5601
# - After verification, cutover with ingress.enabled: false (bulk cleanup in Phase 7)
# - Schema is unified with static-file-server chart's httproute (supports rules[], filters, timeouts)
httproute:
  enabled: true
  annotations: {}
  parentRefs:
    - name: ngf
      namespace: nginx-gateway
      # sectionName: https     # When binding to HTTPS listener
      # port: 443
  hostnames:
    - kibana.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - port: 5601           # name omitted → auto-resolves to kibana-kb-http
  # HTTP→HTTPS 301 redirect sibling HTTPRoute (Phase 4+)
  httpsRedirect:
    enabled: false
