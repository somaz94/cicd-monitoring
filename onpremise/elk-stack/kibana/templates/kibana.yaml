apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
spec:
  version: {{ .Values.version | quote }}
  count: {{ .Values.replicas }}
  elasticsearchRef:
    name: {{ .Values.elasticsearchRef.name }}
  {{- if not .Values.tls.enabled }}
  # tls.enabled=false → disable ECK self-signed cert so the pod serves plain
  # HTTP on :5601. Without this the session cookie is marked Secure and the
  # browser drops it over the HTTP ingress. Ingress `backend-protocol` must
  # also be HTTP. Flip tls.enabled back to true after option C (cert-manager)
  # is wired up.
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  {{- end }}
  {{- if .Values.ingress.enabled }}
  config:
    server.publicBaseUrl: {{ if .Values.tls.enabled }}https{{ else }}http{{ end }}://{{ .Values.ingress.host }}
    {{- if not .Values.tls.enabled }}
    xpack.security.secureCookies: false
    xpack.security.sameSiteCookies: "Lax"
    {{- end }}
  {{- end }}
  podTemplate:
    spec:
      containers:
        - name: kibana
          env:
            - name: NODE_OPTIONS
              value: {{ join " " .Values.nodeOptions | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
