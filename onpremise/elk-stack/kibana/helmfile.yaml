releases:
  - name: kibana
    namespace: logging
    # Public OCI chart — the local templates/ and Chart.yaml under this directory
    # are no longer consumed.
    # Source repo: https://github.com/somaz94/helm-charts (charts/kibana-eck/) / Source repo: https://github.com/somaz94/helm-charts (charts/kibana-eck/).
    # Run `helmfile sync` in `../elasticsearch` first; elasticsearchRef then resolves
    # (`needs:` cannot span separate helmfile state files).
    chart: oci://ghcr.io/somaz94/charts/kibana-eck
    # Pin chart version. Must be <= elasticsearch-eck chart version for Stack compatibility.
    version: "0.1.3"
    values:
      - values/mgmt.yaml

# Ensure namespace before sync (idempotent no-op when present).
# kubectl args aren't shell-parsed → use sh -c to evaluate || true.
hooks:
  - events: ["presync"]
    showlogs: true
    command: "sh"
    args:
      - "-c"
      - "kubectl create namespace logging 2>/dev/null || true"
