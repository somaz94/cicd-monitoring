releases:
  - name: kibana
    namespace: logging
    chart: .
    # Run `helmfile sync` in `../elasticsearch` first; elasticsearchRef then resolves.
    # (`needs:` cannot span separate helmfile state files.)
    values:
      - values/mgmt.yaml

hooks:
  - events: ["presync"]
    showlogs: true
    command: "kubectl"
    args:
      - "create"
      - "namespace"
      - "logging"
      - "--dry-run=client"
      - "-o"
      - "yaml"
      - "||"
      - "true"
