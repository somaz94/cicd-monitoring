fileConfigs:
  01_sources.conf: |-
    <system>
      log_level info
    </system>
    
    # Input from Fluent Bit
    <source>
      @type forward
      port 24224
      bind 0.0.0.0
      tag example-project.*
    </source>

    # Prometheus metrics
    <source>
      @type prometheus
      bind 0.0.0.0
      port 24231
      metrics_path /metrics
    </source>

    <source>
      @type prometheus_monitor
      <labels>
        host ${hostname}
      </labels>
    </source>

    <source>
      @type prometheus_output_monitor
      <labels>
        host ${hostname}
      </labels>
    </source>

  02_filters.conf: |-
    # Step 1: Fallback JSON parsing
    # Fallback for when fluent-bit's example-project_json parser fails
    <filter example-project.**>
      @type parser
      key_name log
      reserve_data true
      reserve_time true
      <parse>
        @type json
      </parse>
      emit_invalid_record_to_error false
    </filter>

    # Step 2: Pino
    # Three input shapes converge on (level / message / label):
    #   - Pino (Node.js): level is Integer (10/20/30/40/50/60), msg is the body
    #   - Serilog (.NET): Level is capital-L String ("Information"/"Warning"/...),
    #                     MessageTemplate is the body
    #   - Plain text (ASP.NET Core bootup, fluent-bit JSON-parse miss): neither
    #                     keyspace present → level="info", message=raw text
    <filter example-project.**>
      @type record_transformer
      enable_ruby true
      <record>
        level ${if record["level"].is_a?(Integer); {10=>"trace",20=>"debug",30=>"info",40=>"warn",50=>"error",60=>"fatal"}[record["level"]] || "info"; elsif record["Level"].is_a?(String); {"Verbose"=>"trace","Debug"=>"debug","Information"=>"info","Warning"=>"warn","Error"=>"error","Fatal"=>"fatal"}[record["Level"]] || record["Level"].downcase; else; record["level"] || "info"; end}
        message ${m = record["msg"] || record["message"] || record["MessageTemplate"] || ""; m.is_a?(String) ? m.gsub(/[\x00-\x1f\x7f]/, '') : m.to_s}
        label ${record["label"] || "unknown"}
      </record>
    </filter>

    # Step 3: Timestamp normalization + cleanup of unnecessary fields
    # Source-of-truth precedence:
    #   - Pino:    time (Unix ms Integer) → Asia/Seoul ISO8601
    #   - Serilog: Timestamp (ISO8601 String w/ offset) → Asia/Seoul ISO8601
    #   - generic timestamp
    #   - fallback → receive time (Asia/Seoul ISO8601)
    # Serilog parse is wrapped in `rescue` so a malformed Timestamp falls back to
    # the raw string instead of breaking the filter chain.
    <filter example-project.**>
      @type record_transformer
      enable_ruby true
      <record>
        @timestamp ${if record["time"].is_a?(Integer); t = Time.at(record["time"]/1000.0); t.localtime("+09:00").strftime("%Y-%m-%dT%H:%M:%S.%3N%:z"); elsif record["Timestamp"]; (Time.iso8601(record["Timestamp"]).localtime("+09:00").strftime("%Y-%m-%dT%H:%M:%S.%3N%:z") rescue record["Timestamp"]); elsif record["timestamp"]; record["timestamp"]; elsif record["@timestamp"]; record["@timestamp"]; else; Time.now.localtime("+09:00").strftime("%Y-%m-%dT%H:%M:%S.%3N%:z"); end}
      </record>
      # Drop original keys we already promoted to canonical names.
      # Properties stays (Serilog free-form payload, picked up by ES dynamic
      # mapping under the dev-example-project-battle index).
      remove_keys time,msg,filepath,req,log,Timestamp,Level,MessageTemplate
    </filter>

    # Step 4: Handle nested JSON inside the data field
    # Convert requestBody, responseBody, requestHeader to JSON strings (compatible with ES text mapping)
    <filter example-project.**>
      @type record_transformer
      enable_ruby true
      <record>
        data ${d = record["data"]; d = (JSON.parse(d) rescue d) if d.is_a?(String); if d.is_a?(Hash); ["requestBody", "responseBody", "requestHeader"].each do |k| ; if d.dig(k).is_a?(Hash); d[k] = d[k].to_json; elsif d.dig(k).is_a?(String); d[k] = (JSON.parse(d[k]).to_json rescue d[k]); end; end; end; d}
      </record>
    </filter>

    # Step 5: Unescape \n in stack array
    <filter example-project.**>
      @type record_transformer
      enable_ruby true
      <record>
        stack ${s = record["stack"]; s.is_a?(Array) ? s.map do |l| l.to_s.gsub('\\n', "\n").gsub('\\"', '"') end : s rescue s}
      </record>
    </filter>

    # Step 6: ES dedup key (id_key)
    # Lift record["data"]["traceId"] to top-level _doc_id so the ES output's
    # id_key can find it (fluent-plugin-elasticsearch's id_key does not resolve
    # nested dot-paths). When data.traceId is absent (startup/lifecycle logs,
    # ~20% of game records), _doc_id is nil → ES output falls back to random
    # _id (no dedup for that subset; acceptable since those records are rare
    # and bounded by pod restart frequency).
    <filter example-project.**>
      @type record_transformer
      enable_ruby true
      <record>
        _doc_id ${record["data"].is_a?(Hash) ? record["data"]["traceId"] : nil}
      </record>
    </filter>

  03_outputs.conf: |-
    # Output to Elasticsearch with dynamic index based on log_source
    <match example-project.**>
      @type elasticsearch
      host "#{ENV['FLUENT_ELASTICSEARCH_HOST']}"
      port "#{ENV['FLUENT_ELASTICSEARCH_PORT']}" 
      user "#{ENV['FLUENT_ELASTICSEARCH_USER']}"
      password "#{ENV['FLUENT_ELASTICSEARCH_PASSWORD']}"
      scheme "#{ENV['FLUENT_ELASTICSEARCH_SCHEME']}"
      ssl_verify "#{ENV['FLUENT_ELASTICSEARCH_SSL_VERIFY']}"
      ssl_version TLSv1_2
      
      # Dynamic index name based on log_source field
      index_name ${log_source}
      type_name _doc
      suppress_type_name true

      # Deterministic _id from data.traceId (set by 02_filters Step 6).
      # Idempotent re-ingestion (backfill / replay / fluent-bit restart with
      # stale offsets) overwrites instead of duplicating. When _doc_id is nil
      # the plugin falls back to random _id (no dedup for that record).
      id_key _doc_id
      remove_keys _doc_id

      # Buffer settings for performance
      <buffer tag,log_source>
        @type file
        path /var/log/fluent/elasticsearch-buffers
        flush_mode interval
        flush_interval 10s
        flush_thread_count 4
        chunk_limit_size 16MB
        # chunk count cap matches disk cap: 128 × 16MB = 2GB
        queue_limit_length 128
        retry_type exponential_backoff
        retry_wait 1s
        # Retry forever to align with fluent-bit Retry_Limit no_limits
        retry_forever true
        # Block input on overflow so backpressure pushes back to fluent-bit storage
        overflow_action block
        total_limit_size 4GB
        flush_at_shutdown true
      </buffer>

      # Performance settings
      bulk_message_request_threshold 1024

      # Safety net for unrecoverable records; retry_forever keeps recoverable ones in the primary buffer
      <secondary>
        @type file
        path /var/log/failed-records
        <format>
          @type json
        </format>
      </secondary>
    </match>

  # Suppress upstream chart 0.5.3 defaults that would otherwise leak dead routes
  # into the fluentd ConfigMap. The upstream `fileConfigs` ships a four-file chain —
  # `01_sources.conf` (host /var/log/containers/*.log tail) → `02_filters.conf`
  # (`@KUBERNETES` block) → `03_dispatch.conf` (`@DISPATCH` prometheus filter + relabel
  # to `@OUTPUT`) → `04_outputs.conf` (`@OUTPUT` → `elasticsearch-master:9200`).
  # We override 01 + 02 above with our own fluent-bit-forward + example-project.** pipeline,
  # and add 03_outputs.conf pointing at the ECK service (`elasticsearch-es-http`).
  # But 03_dispatch.conf + 04_outputs.conf are different keys, so Helm dict-merge
  # keeps the upstream defaults — `@OUTPUT` plugin still initializes against the
  # now-deleted `elasticsearch-master` service, exposing `fluentd_output_status_emit_records
  # {type="elasticsearch"} = 0` and firing `FluentdIngestStalled` (PromQL `rate(... == 0)`)
  # as a false positive. Empty-string overrides below emit an empty ConfigMap entry
  # for each, which fluentd treats as a no-op.
  03_dispatch.conf: ""
  04_outputs.conf: ""

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

rbac:
  create: true

