# DaemonSet, Deployment or StatefulSet
kind: "StatefulSet"
# variant aligns with fluent-plugin-elasticsearch supported builds.
# No elasticsearch9 variant is published upstream; elasticsearch8 variant is
# confirmed compatible with ES 9.0 bulk API (Phase 0 validation, 2026-04-14).
variant: elasticsearch8
replicaCount: 1

image:
  repository: "fluent/fluentd-kubernetes-daemonset"
  tag: "v1.19.2-debian-elasticsearch8-1.4"


env:
  - name: FLUENT_ELASTICSEARCH_HOST
    value: "elasticsearch-es-http"
  - name: FLUENT_ELASTICSEARCH_PORT
    value: "9200"
  # ECK-managed elastic-user secret stores the password under a key named
  # after the user (no username key). Inline the username.
  - name: FLUENT_ELASTICSEARCH_USER
    value: "elastic"
  - name: FLUENT_ELASTICSEARCH_PASSWORD
    valueFrom:
      secretKeyRef:
        name: elasticsearch-es-elastic-user
        key: elastic
  - name: FLUENT_ELASTICSEARCH_SCHEME
    value: "https"
  - name: FLUENT_ELASTICSEARCH_SSL_VERIFY
    value: "false"

envFrom: []

# TLS CA mount removed — ssl_verify is false against the ECK-managed
# self-signed cert (internal cluster traffic).
volumes: []

volumeMounts: []

persistence:
  enabled: true
  storageClass: "nfs-client-server"
  accessMode: ReadWriteOnce
  size: 10Gi

service:
  enabled: true
  type: "ClusterIP"
  annotations: {}
  # loadBalancerIP:
  # externalTrafficPolicy: Local
  ports: 
  - name: "forwarder"
    protocol: TCP
    containerPort: 24224

# ServiceMonitor (Prometheus metrics for Fluentd)
metrics:
  serviceMonitor:
    enabled: true
    namespace: logging
    additionalLabels:
      release: kube-prometheus-stack

  # PrometheusRule — buffer / retry / pipeline stall detection
  prometheusRule:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack
    rules:
      # Pod down — no metrics scraped at all
      - alert: FluentdDown
        expr: up{job="fluentd"} == 0
        for: 2m
        labels:
          context: fluentd
          severity: critical
        annotations:
          summary: "Fluentd aggregator down (logging ns)"
          description: "fluent-bit forward 가 차단됨. fluent-bit storage 가 흡수 중이며 fluentd 복구 시 자동 재개. {{ $labels.pod }} on {{ $labels.instance }}"

      # Scrape missing (job disappeared)
      - alert: FluentdScrapeMissing
        expr: absent(up{job="fluentd"} == 1)
        for: 10m
        labels:
          context: fluentd
          severity: warning
        annotations:
          summary: "Fluentd metrics scrape missing"
          description: "ServiceMonitor

      # Buffer queue length high (~40% of queue_limit_length 128)
      - alert: FluentdBufferQueueHigh
        expr: fluentd_output_status_buffer_queue_length{type="elasticsearch"} > 50
        for: 5m
        labels:
          context: fluentd
          severity: warning
        annotations:
          summary: "Fluentd ES output buffer queue rising"
          description: "queue={{ $value }}/128 chunks. ES 처리량 또는 fluentd flush_thread 한계 의심. {{ $labels.pod }}"

      # Buffer queue critical — almost full (~78%)
      - alert: FluentdBufferQueueCritical
        expr: fluentd_output_status_buffer_queue_length{type="elasticsearch"} > 100
        for: 1m
        labels:
          context: fluentd
          severity: critical
        annotations:
          summary: "Fluentd ES buffer queue near limit"
          description: "queue={{ $value }}/128. 곧 overflow → fluent-bit 으로 block. ES 즉시 점검 필요"

      # Buffer disk size > 75% of total_limit_size (4GB → 3GB threshold)
      - alert: FluentdBufferDiskHigh
        expr: fluentd_output_status_buffer_total_bytes{type="elasticsearch"} > 3221225472
        for: 5m
        labels:
          context: fluentd
          severity: warning
        annotations:
          summary: "Fluentd buffer disk usage > 3GB"
          description: "buffer={{ $value | humanize1024 }}B

      # Retry rate non-zero — possible transient ES failure or throttling
      - alert: FluentdRetryRising
        expr: rate(fluentd_output_status_retry_count{type="elasticsearch"}[5m]) > 0
        for: 10m
        labels:
          context: fluentd
          severity: warning
        annotations:
          summary: "Fluentd → ES retry rate elevated"
          description: "최근 10분간 retry 발생 중. ES cluster status

      # Pipeline stalled — buffer has chunks (input arrived) but ES emit is zero
      #
      # sum() aggregation avoids per-plugin_id stale series firing on their own
      # AND buffer_queue_length>0 distinguishes real stall from quiet input window
      - alert: FluentdIngestStalled
        expr: |
          sum(rate(fluentd_output_status_emit_records{type="elasticsearch"}[10m])) == 0
          and
          sum(fluentd_output_status_buffer_queue_length{type="elasticsearch"}) > 0
        for: 10m
        labels:
          context: fluentd
          severity: critical
        annotations:
          summary: "Fluentd ingest stalled (buffer non-empty but no records → ES)"
          description: "10분간 ES 로 emit 0 + buffer 에 chunk 잔존 = 진짜 정체. ES cluster status

dashboards:
  enabled: "false"

