# Deploy Elastic Cloud on Kubernetes (ECK) operator via helmfile.
# Operator only — actual Elasticsearch / Kibana CRs are provisioned by sibling components
# (../elasticsearch/, ../kibana/). G14 — operator + CR split into separate helmfiles (preserves independent upgrade.sh).
# Chart version pinned. Bump via ./upgrade.sh after verifying the new release.

repositories:
  - name: elastic
    url: https://helm.elastic.co

releases:
  - name: eck-operator
    namespace: elastic-system
    chart: elastic/eck-operator
    # Chart version reference (keep in sync with upgrade.sh output).
    version: 3.4.0
    values:
      - values/dev.yaml

# Ensure namespace before sync (idempotent no-op when present).
# kubectl args aren't shell-parsed → use sh -c to evaluate || true.
hooks:
  - events: ["presync"]
    showlogs: true
    command: "sh"
    args:
      - "-c"
      - "kubectl create namespace elastic-system 2>/dev/null || true"
