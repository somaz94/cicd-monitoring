releases:
  - name: elasticsearch
    namespace: logging
    chart: .
    values:
      - values/mgmt.yaml

# Ensure the target namespace exists before sync.
hooks:
  - events: ["presync"]
    showlogs: true
    command: "kubectl"
    args:
      - "create"
      - "namespace"
      - "logging"
      - "--dry-run=client"
      - "-o"
      - "yaml"
      - "||"
      - "true"
