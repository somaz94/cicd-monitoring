releases:
  - name: elasticsearch
    namespace: logging
    # Public OCI chart — the local templates/ and Chart.yaml under this directory
    # are no longer consumed.
    # Source repo: https://github.com/somaz94/helm-charts (charts/elasticsearch-eck/)
    chart: oci://ghcr.io/somaz94/charts/elasticsearch-eck
    # Pin chart version. Bump via ./upgrade.sh after verifying the new chart release.
    version: "0.1.1"
    values:
      - values/mgmt.yaml

# Ensure the target namespace exists before sync.
hooks:
  - events: ["presync"]
    showlogs: true
    command: "kubectl"
    args:
      - "create"
      - "namespace"
      - "logging"
      - "--dry-run=client"
      - "-o"
      - "yaml"
      - "||"
      - "true"
