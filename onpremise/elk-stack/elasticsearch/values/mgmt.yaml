---
# Elasticsearch CR values — rendered by templates/elasticsearch.yaml
# The ECK operator watches this CR and reconciles a StatefulSet.

# CR name determines all downstream resource names:
#   - Service: <name>-es-http, <name>-es-internal-http, <name>-es-transport
#   - Secrets: <name>-es-elastic-user, <name>-es-http-certs-public, <name>-es-http-certs-internal
#   - StatefulSet pods: <name>-es-<nodeSet>-<idx>
name: elasticsearch

# Elastic Stack version. Bump and run `helmfile apply` for rolling upgrade.
# Compatibility check required before bumping major versions.
version: "9.3.3"

# Password for the built-in `elastic` superuser.
# Rendered into Secret `<name>-es-elastic-user` (key: elastic) which ECK picks up.
# Leave empty ("") to let ECK auto-generate a random password; retrieve it via:
#   kubectl -n logging get secret elasticsearch-es-elastic-user \
#     -o jsonpath='{.data.elastic}' | base64 -d
elasticPassword: "exampleAdminPassword"

# Single node cluster on NFS (no HA). Increase for production HA.
replicas: 1

# Node roles applied uniformly to the single nodeSet.
roles:
  - master
  - data
  - data_content
  - data_hot
  - data_warm
  - data_cold
  - ingest
  - ml
  - remote_cluster_client
  - transform

# Storage — NFS backed, single PVC per pod.
storageClass: nfs-client
storageSize: 30Gi

# Resources — matches the legacy 8.5.1 chart baseline.
resources:
  requests:
    cpu: "100m"
    memory: "2Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

# NFS + hugepages support: disable mmap (uses niofs instead).
# Keeps the sysctl init container as a belt-and-braces measure.
nodeStore:
  allowMmap: false

sysctlInitContainer:
  enabled: true

# Ingress disabled after Phase 6 cutover (2026-04-17) — NGF owns .55. HTTPRoute + BackendTLSPolicy(below) are sole path.
# backend-protocol: HTTPS replaced by BackendTLSPolicy + CA ConfigMap (see httproute/backendTLS below).
ingress:
  enabled: false
  className: nginx
  host: elasticsearch.example.com
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"

# Gateway API HTTPRoute — Phase 3 (ingress-nginx → NGF) parallel deployment
# - Temporary IP: 192.168.1.69 (ngf Gateway), swap to .55 at Phase 6 cutover
# - When backendRefs name is omitted it defaults to `<name>-es-http`, port defaults to 9200
# - backendTLS.enabled: auto-generates BackendTLSPolicy + CA ConfigMap to verify ECK self-signed TLS (9200 HTTPS).
#   Replaces the previous Ingress `backend-protocol: HTTPS` annotation.
# - Schema aligned with static-file-server chart's httproute (supports rules[], filters, timeouts)
httproute:
  enabled: true
  annotations: {}
  parentRefs:
    - name: ngf
      namespace: nginx-gateway
      # sectionName: https
      # port: 443
  hostnames:
    - elasticsearch.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - port: 9200           # name omitted → defaults to elasticsearch-es-http
  httpsRedirect:
    enabled: false
  backendTLS:
    enabled: true
