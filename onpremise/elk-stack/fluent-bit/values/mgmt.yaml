---
# Fluent Bit configuration for mgmt environment
kind: Deployment
replicaCount: 1

image:
  repository: cr.fluentbit.io/fluent/fluent-bit
  # tag omitted on purpose: chart default renders tag from Chart.AppVersion,
  # so `./upgrade.sh` bumps both chart and image in lockstep. Override here
  # only if an image variant outside the chart's default is required
  # (unlike fluentd, which pins an ES-specific variant).
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}

rbac:
  create: true
  nodeAccess: false

podSecurityContext: {}

securityContext:
  runAsUser: 0
  privileged: false

resources:
  requests:
    cpu: "100m"
    memory: "100Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

tolerations: []

nodeSelector: {}

affinity: {}

# fluent-bit forwards to fluentd (not ES directly); ES credentials are not
# needed here. Removed to avoid dead references to monitoring-ns secrets.
env: []

# Volume mounts for log collection
extraVolumeMounts:
  - name: dev-example-project-game-app-logs-pvc-fluentbit
    mountPath: /fluent-bit/logs/example-project/dev/game
    readOnly: true
  - name: dev-example-project-battle-app-logs-pvc-fluentbit
    mountPath: /fluent-bit/logs/example-project/dev/battle
    readOnly: true
  - name: stg-example-project-game-app-logs-pvc-fluentbit
    mountPath: /fluent-bit/logs/example-project/staging/game
    readOnly: true
  - name: qa-example-project-game-app-logs-pvc-fluentbit
    mountPath: /fluent-bit/logs/example-project/qa/game
    readOnly: true

config:
  service: |
    [SERVICE]
        Daemon Off
        Flush 1
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On

  inputs: |
    # Dev ExampleProject Game logs
    [INPUT]
        Name tail
        Path /fluent-bit/logs/example-project/dev/game/*
        Path_Key filepath
        Tag example-project.dev.game
        Parser example-project_json
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On
        Skip_Empty_Lines On
        Refresh_Interval 10
        # Read_from_Head true: reads files from the beginning (causes re-ingestion of all historical logs on restart)
        # Read_from_Head false: reads files from the end (only collects new log entries appended after startup)
        Read_from_Head false
        # Ignore_Older 0: disables age filtering (all files are processed regardless of modification time)
        # Ignore_Older 7d: skips files not modified in the last 7 days (prevents processing months of old logs on NFS)
        Ignore_Older 7d

    # Dev ExampleProject Battle logs
    [INPUT]
        Name tail
        Path /fluent-bit/logs/example-project/dev/battle/*
        Path_Key filepath
        Tag example-project.dev.battle
        Parser example-project_json
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On
        Skip_Empty_Lines On
        Refresh_Interval 10
        Read_from_Head false
        Ignore_Older 7d

    # Staging ExampleProject Game logs
    [INPUT]
        Name tail
        Path /fluent-bit/logs/example-project/staging/game/*
        Path_Key filepath
        Tag example-project.stg.game
        Parser example-project_json
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On
        Skip_Empty_Lines On
        Refresh_Interval 10
        Read_from_Head false
        Ignore_Older 7d

    # QA ExampleProject Game logs
    [INPUT]
        Name tail
        Path /fluent-bit/logs/example-project/qa/game/*
        Path_Key filepath
        Tag example-project.qa.game
        Parser example-project_json
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On
        Skip_Empty_Lines On
        Refresh_Interval 10
        Read_from_Head false
        Ignore_Older 7d

  filters: |
    # Add metadata for dev game logs
    [FILTER]
        Name modify
        Match example-project.dev.game
        Set log_source dev-example-project-game
        Set environment dev
        Set app example-project
        Set component game
        Set label game

    # Add metadata for dev battle logs
    [FILTER]
        Name modify
        Match example-project.dev.battle
        Set log_source dev-example-project-battle
        Set environment dev
        Set app example-project
        Set component battle
        Set label battle

    # Add metadata for staging game logs
    [FILTER]
        Name modify
        Match example-project.stg.game
        Set log_source stg-example-project-game
        Set environment stg
        Set app example-project
        Set component game
        Set label game

    # Add metadata for qa game logs
    [FILTER]
        Name modify
        Match example-project.qa.game
        Set log_source qa-example-project-game
        Set environment qa
        Set app example-project
        Set component game
        Set label game

  outputs: |
    # Send to Fluentd for further processing
    [OUTPUT]
        Name forward
        Match example-project.*
        Host fluentd
        Port 24224
        Retry_Limit 5

  customParsers: |
    [PARSER]
        Name example-project_json
        Format json
        Time_Keep On
        Time_Key @timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%L

    [PARSER]
        Name docker_no_time
        Format json
        Time_Keep Off
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L

logLevel: info

# PersistentVolumes for log collection
persistentVolumes:
  enabled: true
  items:
    - name: dev-example-project-game-app-logs-pv-fluentbit
      storage: 5Gi
      volumeMode: Filesystem
      accessModes:
        - ReadWriteMany
      reclaimPolicy: Retain
      storageClassName: nfs-client-nopath
      path: /volume1/nfs/example-project/dev/server/logs/game
      server: 192.168.1.5
    - name: dev-example-project-battle-app-logs-pv-fluentbit
      storage: 5Gi
      volumeMode: Filesystem
      accessModes:
        - ReadWriteMany
      reclaimPolicy: Retain
      storageClassName: nfs-client-nopath
      path: /volume1/nfs/example-project/dev/server/logs/battle
      server: 192.168.1.5
    - name: stg-example-project-game-app-logs-pv-fluentbit
      storage: 5Gi
      volumeMode: Filesystem
      accessModes:
        - ReadWriteMany
      reclaimPolicy: Retain
      storageClassName: nfs-client-nopath
      path: /volume1/nfs/example-project/staging/server/logs/game
      server: 192.168.1.5
    - name: qa-example-project-game-app-logs-pv-fluentbit
      storage: 5Gi
      volumeMode: Filesystem
      accessModes:
        - ReadWriteMany
      reclaimPolicy: Retain
      storageClassName: nfs-client-nopath
      path: /volume1/nfs/example-project/qa/server/logs/game
      server: 192.168.1.5

# PersistentVolumeClaims for log collection
persistentVolumeClaims:
  enabled: true
  items:
    - name: dev-example-project-game-app-logs-pvc-fluentbit
      accessModes:
        - ReadWriteMany
      storageClassName: nfs-client-nopath
      storage: 5Gi
      selector:
        volumeName: dev-example-project-game-app-logs-pv-fluentbit
    - name: dev-example-project-battle-app-logs-pvc-fluentbit
      accessModes:
        - ReadWriteMany
      storageClassName: nfs-client-nopath
      storage: 5Gi
      selector:
        volumeName: dev-example-project-battle-app-logs-pv-fluentbit
    - name: stg-example-project-game-app-logs-pvc-fluentbit
      accessModes:
        - ReadWriteMany
      storageClassName: nfs-client-nopath
      storage: 5Gi
      selector:
        volumeName: stg-example-project-game-app-logs-pv-fluentbit
    - name: qa-example-project-game-app-logs-pvc-fluentbit
      accessModes:
        - ReadWriteMany
      storageClassName: nfs-client-nopath
      storage: 5Gi
      selector:
        volumeName: qa-example-project-game-app-logs-pv-fluentbit

# =============================================================================
# ServiceMonitor (Prometheus metrics for Fluent Bit)
# Monitors: log throughput, errors, buffer status, retry counts
# =============================================================================
serviceMonitor:
  enabled: true
  namespace: logging
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack
