---
# =============================================================================
# Fluent Bit DaemonSet — stdout collection (post-transition, single release)
# =============================================================================
# Replaces the previous NFS aggregator (single Deployment with 4 RWX PVCs
# mounted from the NFS server) with per-node stdout tailing. /var/log/containers/
# is the kubelet-managed symlink directory; this DaemonSet uses the standard
# cri parser to read CRI-formatted container output.
#
# Coverage (3 INPUTs):
#   - dev game    (ns dev-example-project)     → log_source dev-example-project-game
#   - dev battle  (ns dev-example-project)     → log_source dev-example-project-battle
#   - qa game     (ns qa-example-project)      → log_source qa-example-project-game
#
# Each INPUT carries its own tag and DB file so state is independent and one
# pod's tail position cannot mask another. The 3 modify filters set the same
# log_source values the previous NFS aggregator used, so existing ES indices
# (dev-example-project-game-*, dev-example-project-battle-*, qa-example-project-game-*) keep
# receiving — fluentd routing is unchanged. The historical stg INPUT was
# removed 2026-05-19 (staging-example-project namespace has zero pods); to bring it
# back, re-add an INPUT + modify filter and tag with example-project.stdout.stg.game.*.
#
# 🔥 PINO-PRETTY WORKAROUND (PARTIAL — qa.game only as of 2026-05-19)
# qa.game pods still emit pino-pretty formatted lines:
#   [2026-05-18 07:21:29.744 +0000] \x1b[32mINFO\x1b[39m: \x1b[90m{"level":30,...}\x1b[39m
# The 3-filter chain (lua strip_ansi → parser pino_pretty_extract → parser
# example-project_json_extract via Key_Name log) extracts the embedded JSON for
# fluentd's Pino->Winston normalization. On 2026-05-19 dev.game + dev.battle
# switched their stdout to raw JSON, so the lua/pino_pretty Match patterns are
# narrowed to example-project.stdout.qa.game.* only; the example-project_json_extract filter
# is split into two — a raw branch (Match example-project.stdout.dev.* covers both
# dev.game and dev.battle, Key_Name message) and a pino-pretty branch
# (Match example-project.stdout.qa.game.*, Key_Name log). dev.battle uses Serilog
# schema (Level / Timestamp / MessageTemplate) which is normalized in fluentd
# (see fluentd values/dev.yaml 02_filters.conf Step 2/3).
# Note: fluent-bit [FILTER] Match accepts a *single* wildcard pattern; the
# space-separated multi-pattern form valid in [OUTPUT] routing silently
# matches nothing here, so single-wildcard tag namespaces are intentional.
#
# 🔥 WHEN qa.game ALSO SWITCHES off pino-pretty, follow §3 (full removal) of
# docs/pino-pretty-removal-en.md:
#   - delete the luaScripts.strip_ansi.lua block
#   - delete the [FILTER] lua strip_ansi filter
#   - delete the [FILTER] parser pino_pretty_extract filter
#   - delete the [PARSER] pino_pretty_extract custom parser
#   - merge the two example-project_json_extract branches back into one
#     (Match example-project.stdout.*, Key_Name message)
#   Search "🔥" markers below to find every removable line.
# =============================================================================

kind: DaemonSet

image:
  repository: cr.fluentbit.io/fluent/fluent-bit
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}

rbac:
  create: true
  # nodeAccess: true enables the kubernetes filter to query the node's kubelet
  # endpoint for pod metadata enrichment (namespace, labels, annotations).
  nodeAccess: true

podSecurityContext: {}

securityContext:
  # /var/log/containers and /var/log/pods are root-owned; reading them needs
  # uid 0. fluent-bit official image runs as root by default.
  runAsUser: 0
  privileged: false

resources:
  requests:
    cpu: "50m"
    memory: "100Mi"
  limits:
    cpu: "500m"
    memory: "500Mi"

# No tolerations: DaemonSet only schedules on nodes without NoSchedule taints.
# Cluster layout (2026-05-18):
#   compute-01/02/03 — no taints, hosts application pods
#   compute-04       — dedicated=ci-build:NoSchedule, gitlab-runner only (exclude)
#   control-01/02/03 — control-plane:NoSchedule (exclude)
# Result: 3 DaemonSet pods on compute-01/02/03; idle on nodes without target
# pods, picks them up immediately on reschedule.
tolerations: []

nodeSelector: {}

affinity: {}

# fluent-bit forwards to fluentd (not ES directly) — ES credentials not needed.
env: []

# Per-node state directory for SQLite DB checkpoints + filesystem chunk buffer.
# DaemonSet uses hostPath instead of PVC: each pod owns its own node's state,
# pod restart on the same node preserves checkpoints, no RWO lock contention.
extraVolumes:
  - name: fluentbit-state
    hostPath:
      path: /var/lib/fluent-bit
      type: DirectoryOrCreate

extraVolumeMounts:
  - name: fluentbit-state
    mountPath: /fluent-bit/state

config:
  service: |
    [SERVICE]
        Daemon Off
        Flush 1
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On
        storage.path /fluent-bit/state/storage/
        storage.sync normal
        storage.checksum off
        storage.backlog.mem_limit 50M

  inputs: |
    # Dev ExampleProject Game stdout (kubelet writes to /var/log/containers).
    [INPUT]
        Name tail
        Path /var/log/containers/dev-example-project-game-*_dev-example-project_*.log
        Path_Key filepath
        Tag example-project.stdout.dev.game.*
        Parser cri
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On
        Skip_Empty_Lines On
        Refresh_Interval 10
        # Start from EOF on first apply (avoid replaying historical lines).
        # After DB populates, restarts resume from the last checkpoint
        # regardless of this flag.
        Read_from_Head false
        DB /fluent-bit/state/tail-dev-game.db
        DB.locking true
        DB.sync normal
        storage.type filesystem

    # Dev ExampleProject Battle stdout
    [INPUT]
        Name tail
        Path /var/log/containers/dev-example-project-battle-*_dev-example-project_*.log
        Path_Key filepath
        Tag example-project.stdout.dev.battle.*
        Parser cri
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On
        Skip_Empty_Lines On
        Refresh_Interval 10
        Read_from_Head false
        DB /fluent-bit/state/tail-dev-battle.db
        DB.locking true
        DB.sync normal
        storage.type filesystem

    # QA ExampleProject Game stdout
    [INPUT]
        Name tail
        Path /var/log/containers/qa-example-project-game-*_qa-example-project_*.log
        Path_Key filepath
        Tag example-project.stdout.qa.game.*
        Parser cri
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On
        Skip_Empty_Lines On
        Refresh_Interval 10
        Read_from_Head false
        DB /fluent-bit/state/tail-qa-game.db
        DB.locking true
        DB.sync normal
        storage.type filesystem

  filters: |
    # Enrich with Kubernetes metadata (namespace, pod, labels, annotations) for
    # all 3 INPUTs. Adds a nested "kubernetes" object — useful for Kibana
    # filtering.
    [FILTER]
        Name kubernetes
        Match example-project.stdout.*
        Merge_Log Off
        Keep_Log On
        K8S-Logging.Parser Off
        K8S-Logging.Exclude Off

    # 🔥 PINO-PRETTY WORKAROUND BEGIN (qa.game only as of 2026-05-19)
    # Strip ANSI CSI color sequences (\x1b[<digits>m) that pino-pretty injects.
    # Acts on the `message` field — Parser cri stores the container log line
    # under `message` (not `log`); Lua + parser filters below must align on the
    # same key.
    [FILTER]
        Name lua
        Match example-project.stdout.qa.game.*
        script /fluent-bit/scripts/strip_ansi.lua
        call strip_ansi

    # Extract the JSON object portion from "[<ts>] LEVEL: { ... }".
    # The pino_pretty_extract parser regex binds the inner JSON string to a new
    # `log` key for the next parser stage.
    [FILTER]
        Name parser
        Match example-project.stdout.qa.game.*
        Key_Name message
        Parser pino_pretty_extract
        Reserve_Data On
        Preserve_Key Off
    # 🔥 PINO-PRETTY WORKAROUND END

    # Raw-JSON branch — dev.game (Pino NDJSON) + dev.battle (Serilog JSON).
    # Both components emit valid JSON as the first character of stdout, so
    # parse straight from `message` (the cri parser key). The Match below uses
    # a single wildcard pattern example-project.stdout.dev.* because fluent-bit's
    # [FILTER] Match is a single-pattern string (unlike [OUTPUT] routing) —
    # space-separated multi-patterns silently match nothing. dev.* covers
    # dev.game + dev.battle and excludes qa.game (still pino-pretty).
    # dev.battle uses a different key shape (Level / Timestamp / MessageTemplate
    # / Properties); fluentd's 02_filters.conf normalizes that to level /
    # @timestamp / message. Plain-text bootup lines (ASP.NET Core "Now
    # listening on: ...", "info: Microsoft.Hosting.Lifetime[0]") fail JSON
    # parse here and pass through unchanged — fluentd treats the raw text as
    # the message body and falls back to level=info / @timestamp=receive time.
    [FILTER]
        Name parser
        Match example-project.stdout.dev.*
        Key_Name message
        Parser example-project_json_extract
        Reserve_Data On
        Preserve_Key Off

    # Pino-pretty branch — qa.game. Consumes the `log` field produced by
    # pino_pretty_extract above. Promotes level/time/req/context/data to
    # top-level for fluentd's Pino->Winston normalization.
    [FILTER]
        Name parser
        Match example-project.stdout.qa.game.*
        Key_Name log
        Parser example-project_json_extract
        Reserve_Data On
        Preserve_Key Off

    # Per-component metadata: log_source drives fluentd's dynamic index name.
    [FILTER]
        Name modify
        Match example-project.stdout.dev.game.*
        Set log_source dev-example-project-game
        Set environment dev
        Set app example-project
        Set component game
        Set label game
        Set collection_path stdout

    [FILTER]
        Name modify
        Match example-project.stdout.dev.battle.*
        Set log_source dev-example-project-battle
        Set environment dev
        Set app example-project
        Set component battle
        Set label battle
        Set collection_path stdout

    [FILTER]
        Name modify
        Match example-project.stdout.qa.game.*
        Set log_source qa-example-project-game
        Set environment qa
        Set app example-project
        Set component game
        Set label game
        Set collection_path stdout

  outputs: |
    # Forward to fluentd (same target as the retired NFS aggregator). fluentd's
    # existing <match example-project.**> block handles Pino->Winston normalization,
    # timestamp conversion, and ES indexing — no fluentd config change required.
    [OUTPUT]
        Name forward
        Match example-project.*
        Host fluentd
        Port 24224
        Retry_Limit no_limits
        storage.total_limit_size 2G
        # Wire-format compatibility with fluentd in_forward.
        # fluent-bit >= 3.2 (chart 5.0.3+) added entry-level metadata to forward
        # events, producing [time, metadata, record] tuples that fluentd parses
        # as time=[real_time, {}] and rejects as "skip invalid event".
        # Send_options Off disables the option header; Time_as_Integer On encodes
        # time as native msgpack int — both restore the legacy [time, record].
        Send_options Off
        Time_as_Integer On

  customParsers: |
    # 🔥 PINO-PRETTY WORKAROUND parser — extracts JSON object after
    # "[YYYY-MM-DD hh:mm:ss.SSS +zzzz] LEVEL: " prefix produced by pino-pretty.
    # Used by the qa.game branch only (as of 2026-05-19); remove when qa.game
    # also switches to raw JSON stdout.
    #
    # Two pino-pretty line shapes are observed:
    #   A) "[ts] LEVEL: {JSON}"                                — msg is already
    #      a raw JSON object (typical request-handling logs).
    #   B) "[ts] LEVEL: <controller-name> {sub}: ... {JSON}"    — msg has a
    #      free-text prefix and sometimes intermediate "{sub-object}" tokens
    #      that are not valid JSON (e.g. NestJS routing setup such as
    #      "CostumesController {/costumes}: {...}" or
    #      "Mapped {/costumes/purchase, POST} route {...}").
    # The regex below absorbs prefix via lazy `.*?`, then anchors `log` to the
    # last segment that *starts* with `{"key":...` — required so it skips over
    # unquoted "{sub-object}" placeholders and only captures the trailing valid
    # Pino payload.
    [PARSER]
        Name pino_pretty_extract
        Format regex
        Regex ^\[[^\]]+\]\s+\w+:\s+.*?(?<log>\{"[\w-]+":.*\})\s*$

    # JSON parser for the extracted (or natively raw) JSON payload. Used by
    # both the raw branch (dev.game + dev.battle, Key_Name message) and the
    # pino-pretty branch (qa.game, Key_Name log). Time parsing intentionally
    # omitted — Pino's "time" (Unix ms int) and Serilog's "Timestamp" (ISO8601
    # string) are both normalized in fluentd's record_transformer to
    # "@timestamp" in Asia/Seoul ISO 8601.
    [PARSER]
        Name example-project_json_extract
        Format json

# 🔥 PINO-PRETTY WORKAROUND — luaScripts block stays as long as qa.game emits
# pino-pretty. Remove together with the lua filter once qa.game also switches.
luaScripts:
  strip_ansi.lua: |
    -- Strip ANSI CSI escape sequences used by pino-pretty for color output.
    -- Pattern: ESC ('\27') '[' <digits/;>* 'm'
    -- Operates on the `message` field produced by Parser cri (the standard key
    -- for container log line content; not `log`).
    function strip_ansi(tag, ts, record)
        local msg = record["message"]
        if msg == nil then
            return 0, ts, record
        end
        record["message"] = string.gsub(msg, "\27%[[%d;]*m", "")
        return 1, ts, record
    end

logLevel: info

# DaemonSet uses hostPath for state — no PVC needed. Each node owns its own
# checkpoint; pod restart on the same node preserves it.
persistentVolumes:
  enabled: false

persistentVolumeClaims:
  enabled: false

# =============================================================================
# ServiceMonitor (Prometheus metrics for Fluent Bit)
# Monitors: log throughput, errors, buffer status, retry counts
# =============================================================================
serviceMonitor:
  enabled: true
  namespace: logging
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack
