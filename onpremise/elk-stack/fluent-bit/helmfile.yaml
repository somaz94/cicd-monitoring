# Deploy Fluent Bit (log forwarder) via helmfile, consuming the LOCAL vendored chart.
# `chart: .` — Chart.yaml + templates/ + dashboards/ in this directory ARE the source of truth.
# Upstream sync (reflecting fluent/fluent-bit chart changes) is a manual procedure tracked separately.
# Chart version mirrored from upstream Chart.yaml release.

releases:
  # Single DaemonSet release, tails /var/log/containers for dev/qa/stg example-project
  # workloads. Replaces the prior NFS-aggregator Deployment (RWX PVCs from NFS).
  # See values/dev.yaml header for the per-INPUT layout (pino-pretty workaround
  # retired 2026-05-22; history in docs/pino-pretty-removal-en.md).
  - name: fluent-bit
    namespace: logging
    chart: .
    version: 0.57.6
    values:
      - values/dev.yaml
