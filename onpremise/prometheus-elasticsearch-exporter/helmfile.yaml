# Deploy prometheus-elasticsearch-exporter via helmfile, consuming upstream prometheus-community chart.
# Scrapes the sibling Elasticsearch cluster (../../logging/elasticsearch/).
# Chart version pinned. Bump via ./upgrade.sh after verifying the new release.

repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

releases:
  - name: prometheus-elasticsearch-exporter
    chart: prometheus-community/prometheus-elasticsearch-exporter
    namespace: logging
    version: 7.2.1
    values:
      - values/mgmt.yaml
