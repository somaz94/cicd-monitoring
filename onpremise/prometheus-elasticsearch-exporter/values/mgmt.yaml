# =============================================================================
# prometheus-elasticsearch-exporter Custom Values
# Monitors: ECK-managed Elasticsearch in logging namespace
# =============================================================================

# Elasticsearch connection
# Username is fixed to "elastic" (ECK superuser).
# Password from ECK-managed secret: elasticsearch-es-elastic-user (key: elastic).
es:
  uri: "https://elastic:$(ES_PASSWORD)@elasticsearch-es-http:9200"
  sslSkipVerify: true

extraEnvSecrets:
  ES_PASSWORD:
    secret: elasticsearch-es-elastic-user
    key: elastic

# Resources
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

# ServiceMonitor for Prometheus auto-discovery
serviceMonitor:
  enabled: true
  namespace: logging
  interval: 30s
  labels:
    release: kube-prometheus-stack
