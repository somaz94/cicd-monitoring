# =============================================================================
# Node Exporter Target Servers
# Add new servers to the appropriate group and run the playbook to deploy.
# =============================================================================

[physical_servers]
server1 ansible_host=192.168.1.10
server2 ansible_host=192.168.1.12
server3 ansible_host=192.168.1.20
server4 ansible_host=192.168.1.15

[virtual_machines]
# Add VMs here as needed:
# vm1 ansible_host=192.168.1.100
# vm2 ansible_host=192.168.1.101

# =============================================================================
# Group that includes all monitoring targets
# =============================================================================
[node_exporter:children]
physical_servers
virtual_machines

# =============================================================================
# Connection settings (shared across all targets)
# =============================================================================
[node_exporter:vars]
ansible_user=example
ansible_ssh_private_key_file=~/.ssh/id_rsa_example
ansible_become=yes
ansible_become_method=sudo
