# =============================================================================
# Node Exporter Target Servers
# Add new servers to the appropriate group and run the playbook to deploy.
# =============================================================================

[physical_servers]
server1 ansible_host=10.0.0.1
server2 ansible_host=10.0.0.2
server3 ansible_host=10.0.0.3
server4 ansible_host=10.0.0.4

[virtual_machines]
# Add VMs here as needed:
# vm1 ansible_host=10.0.0.100
# vm2 ansible_host=10.0.0.101

# =============================================================================
# Group that includes all monitoring targets
# =============================================================================
[node_exporter:children]
physical_servers
virtual_machines

# =============================================================================
# Connection settings (shared across all targets)
# =============================================================================
[node_exporter:vars]
ansible_user=deploy
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_become=yes
ansible_become_method=sudo
