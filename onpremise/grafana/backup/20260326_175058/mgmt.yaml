---
replicas: 1

deploymentStrategy:
  type: RollingUpdate

image:
  registry: docker.io
  repository: grafana/grafana

testFramework:
  enabled: true
  image:
    registry: docker.io
    repository: bats/bats
    tag: "v1.4.1"
  imagePullPolicy: IfNotPresent

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  seccompProfile:
    type: RuntimeDefault

downloadDashboardsImage:
  registry: docker.io
  repository: curlimages/curl
  tag: 7.85.0
  sha: ""
  pullPolicy: IfNotPresent

adminUser: admin
adminPassword: exampleAdminPassword

service:
  enabled: true
  type: ClusterIP

serviceMonitor:
  enabled: true
  path: /metrics

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  labels: {}
  path: /
  pathType: Prefix
  hosts:
    - grafana.somaz.example.com

resources: {}
#  limits:
#    cpu: 100m
#    memory: 128Mi
#  requests:
#    cpu: 100m
#    memory: 128Mi

tolerations:
  - key: "monitoring"
    operator: "Equal"
    effect: "NoSchedule"

nodeSelector:
  local-path: enabled

# sidecar:
#   datasources:
#     enabled: true

## Enable persistence using Persistent Volume Claims
persistence:
  type: pvc
  enabled: true
  storageClassName: default
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  finalizers:
    - kubernetes.io/pvc-protection

initChownData:
  enabled: true
  image:
    registry: docker.io
    repository: library/busybox
    tag: "1.31.1"
    sha: ""
    pullPolicy: IfNotPresent
  resources: {}

