# =============================================================================
# Vaultwarden Custom Values (guerzon/vaultwarden chart)
# Components: Vaultwarden server, SQLite, Backup CronJob
# =============================================================================

# =============================================================================
# Domain & Core Settings
# =============================================================================
# DOMAIN env var — use https:// with self-signed certificate
domain: "https://vault.example.com"

fullnameOverride: "vaultwarden"

image:
  tag: "1.35.4-alpine"
  pullPolicy: IfNotPresent

# =============================================================================
# Admin Portal
# =============================================================================
# Access: https://vault.example.com/admin
# Use plain text token below to log in.
# Vaultwarden also accepts argon2 hashed tokens.
adminToken:
  value: "exampleAdminToken"

# =============================================================================
# Database (SQLite default)
# =============================================================================
database:
  type: "default"

# =============================================================================
# Features
# =============================================================================
webVaultEnabled: "true"
allowSignups: true
signupsVerify: false
showPassHint: false
allowInvitation: true
invitationExpirationHours: "120"
emergencyAccessAllowed: true

# =============================================================================
# Storage (Persistent Volume)
# =============================================================================
storage:
  data:
    name: "vaultwarden-data"
    size: "25Gi"
    class: "nfs-client"
    path: "/data"
    keepPvc: true
    accessMode: "ReadWriteOnce"

# =============================================================================
# Service
# =============================================================================
service:
  type: ClusterIP
  port: 80

# =============================================================================
# Ingress (HTTPS — self-signed certificate)
#
# Self-signed TLS secret must be created before deployment:
#   openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout vw-key.pem -out vw-cert.pem -subj "/CN=vault.example.com"
#   kubectl create secret tls vaultwarden-tls \
#     --cert=vw-cert.pem --key=vw-key.pem -n vaultwarden
#   rm vw-key.pem vw-cert.pem
# =============================================================================
ingress:
  enabled: true
  class: "nginx"
  nginxIngressAnnotations: true
  additionalAnnotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hostname: "vault.example.com"
  tls: true
  tlsSecret: "vaultwarden-tls"
  path: /
  pathType: Prefix

# ── HTTPS with cert-manager + Let's Encrypt (alternative) ──
# Prerequisites:
#   1. Install cert-manager: https://cert-manager.io/docs/installation/
#   2. Create ClusterIssuer (e.g., cloudflare-issuer)
# Ref: https://github.com/dani-garcia/vaultwarden/wiki/Enabling-HTTPS
#
# ingress:
#   additionalAnnotations:
#     cert-manager.io/cluster-issuer: "cloudflare-issuer"
#   tlsSecret: "vaultwarden-tls"

# =============================================================================
# Resources
# =============================================================================
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  create: true

# =============================================================================
# Backup CronJob (via extraObjects)
#
# Backup Strategy:
#   - CronJob runs daily at KST 03:00 (UTC 18:00)
#   - Date-stamped files: db-YYYYMMDD.sqlite3, rsa_key-YYYYMMDD.pem
#   - Retention: 30 days (older backups auto-deleted)
#   - Data PVC mounted as readOnly, Backup PVC as readWrite
#
# Restore: ./scripts/restore.sh [YYYYMMDD|latest]
# =============================================================================
extraObjects:
  # Self-signed TLS Secret (valid for 10 years)
  # Regenerate: openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
  #   -keyout vw-key.pem -out vw-cert.pem -subj "/CN=vault.example.com"
  # Then base64 encode: base64 < vw-cert.pem | tr -d '\n' and base64 < vw-key.pem | tr -d '\n'
  - apiVersion: v1
    kind: Secret
    metadata:
      name: vaultwarden-tls
      namespace: vaultwarden
    type: kubernetes.io/tls
    data:
      tls.crt: 
      tls.key: 

  # Backup PVC
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: vaultwarden-backup-data
      namespace: vaultwarden
      annotations:
        nfs.io/storage-path: "vaultwarden-backup-data"
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: "nfs-client"
      resources:
        requests:
          storage: 25Gi

  # Backup CronJob — date-stamped with retention
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: vaultwarden-backup
      namespace: vaultwarden
    spec:
      # KST 03:00 = UTC 18:00
      schedule: "0 18 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 3
      jobTemplate:
        spec:
          template:
            spec:
              restartPolicy: OnFailure
              containers:
                - name: backup
                  image: busybox:latest
                  command: ["sh", "-c"]
                  args:
                    - |
                      set -e
                      DATE=$(date +%Y%m%d)
                      BACKUP_DIR="/backup-data"
                      RETENTION_DAYS=30

                      echo "[$(date)] Starting backup..."

                      # Date-stamped backup
                      cp /data/db.sqlite3 "$BACKUP_DIR/db-${DATE}.sqlite3"
                      cp /data/rsa_key.pem "$BACKUP_DIR/rsa_key-${DATE}.pem" 2>/dev/null || true
                      echo "[$(date)] Backup created: db-${DATE}.sqlite3"

                      # Retention: delete backups older than N days
                      DELETED=$(find "$BACKUP_DIR" -name "db-*.sqlite3" -mtime +${RETENTION_DAYS} -delete -print | wc -l)
                      find "$BACKUP_DIR" -name "rsa_key-*.pem" -mtime +${RETENTION_DAYS} -delete
                      echo "[$(date)] Retention: deleted ${DELETED} backups older than ${RETENTION_DAYS} days"

                      # List current backups
                      echo ""
                      echo "Available backups:"
                      ls -lh "$BACKUP_DIR"/db-*.sqlite3 2>/dev/null || echo "  (none)"
                      echo ""
                      echo "[$(date)] Backup complete."
                  volumeMounts:
                    - name: data
                      mountPath: /data
                      readOnly: true
                    - name: backup
                      mountPath: /backup-data
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: vaultwarden-data-vaultwarden-0
                - name: backup
                  persistentVolumeClaim:
                    claimName: vaultwarden-backup-data
