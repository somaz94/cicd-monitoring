# =============================================================================
# Vaultwarden Custom Values (guerzon/vaultwarden chart)
# Components: Vaultwarden server, SQLite, Backup CronJob
# =============================================================================

# =============================================================================
# Domain & Core Settings
# =============================================================================
# DOMAIN env var — use https:// with self-signed certificate
domain: "https://vault.example.com"

fullnameOverride: "vaultwarden"

# =============================================================================
# Admin Portal
# =============================================================================
# Access: https://vault.example.com/admin
# Use plain text token below to log in.
# Vaultwarden also accepts argon2 hashed tokens.
adminToken:
  value: "exampleAdminPassword"

# =============================================================================
# SSO — GitLab OpenID Connect
# =============================================================================
# Prerequisites:
#   1. GitLab Admin → Applications → New Application
#      - Name: Vaultwarden
#      - Redirect URI: https://vault.example.com/identity/connect/oidc-signin
#      - Confidential: Yes
#      - Scopes: openid, email, profile
#   2. Copy Application ID → clientId.value
#   3. Copy Secret → clientSecret.value
#
# Note: Vaultwarden SSO does NOT support group-based access control.
#       All SSO-authenticated users get the same permissions.
#       Use allowSignups/signupDomains to restrict who can register.
# =============================================================================
sso:
  enabled: true
  authority: "http://gitlab.example.com"
  scopes: "openid email profile"
  signupsMatchEmail: true
  ignoreEmailVerification: true
  pkce: true
  clientId:
    value: "<GITLAB_CLIENT_ID>"
  clientSecret:
    value: "<GITLAB_CLIENT_SECRET>"

# =============================================================================
# Database (SQLite default)
# =============================================================================
database:
  type: "default"

# =============================================================================
# Features & Convenience Settings
# =============================================================================
webVaultEnabled: "true"
allowSignups: true
signupsVerify: "false"
showPassHint: false
allowInvitation: true
invitationsAllowed: true
invitationExpirationHours: "120"
emergencyAccessAllowed: true
requireDeviceEmail: "false"
orgGroupsEnabled: "true"
orgEventsEnabled: "true"
adminRateLimitSeconds: "60"
adminRateLimitMaxBurst: "10"

# =============================================================================
# Storage (Persistent Volume)
# =============================================================================
storage:
  data:
    name: "vaultwarden-data"
    size: "25Gi"
    class: "nfs-client"
    path: "/data"
    keepPvc: true
    accessMode: "ReadWriteOnce"

# =============================================================================
# Service
# =============================================================================
service:
  type: ClusterIP
  port: 80

# =============================================================================
# Ingress (HTTPS — self-signed certificate)
#
# =============================================================================
# Ingress disabled after Phase 6 cutover (2026-04-17) — NGF owns .55.
# HTTPRoute via extraObjects below is the sole path, HTTPS termination by
# Gateway (wildcard-example-tls) rather than this Ingress/vaultwarden-tls.
# Legacy fields retained for rollback reference; re-enable only if NGF path is reverted.
ingress:
  enabled: false
  class: "nginx"
  nginxIngressAnnotations: true
  additionalAnnotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hostname: "vault.example.com"
  path: /
  pathType: Prefix

# ── HTTPS with cert-manager + Let's Encrypt (alternative) ──
# Prerequisites:
#   1. Install cert-manager: https://cert-manager.io/docs/installation/
#   2. Create ClusterIssuer (e.g., cloudflare-issuer)
# Ref: https://github.com/dani-garcia/vaultwarden/wiki/Enabling-HTTPS
#
# ingress:
#   additionalAnnotations:
#     cert-manager.io/cluster-issuer: "cloudflare-issuer"
#   tlsSecret: "vaultwarden-tls"

# =============================================================================
# Resources
# =============================================================================
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  create: true

# =============================================================================
# Backup CronJob (via extraObjects)
#
# Backup Strategy:
#   - CronJob runs daily at KST 03:00 (UTC 18:00)
#   - Date-stamped files: db-YYYYMMDD.sqlite3, rsa_key-YYYYMMDD.pem
#   - Retention: 30 days (older backups auto-deleted)
#   - Data PVC mounted as readOnly, Backup PVC as readWrite
#
# Restore: ./scripts/restore.sh [YYYYMMDD|latest]
# =============================================================================
extraObjects:
  # Note: 2026-04-17 self-signed `vaultwarden-tls` Secret removed (unused after Phase 6 cutover).
  # HTTPS termination is handled by `wildcard-example-tls` on NGF ngf Gateway (nginx-gateway ns).
  # If re-introduction is needed: see Git history or `network/nginx-gateway-fabric/docs/tls-wildcard-setup.md`.

  # Backup PVC
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: vaultwarden-backup-data
      namespace: vaultwarden
      annotations:
        nfs.io/storage-path: "vaultwarden-backup-data"
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: "nfs-client"
      resources:
        requests:
          storage: 25Gi

  # Backup CronJob — date-stamped with retention
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: vaultwarden-backup
      namespace: vaultwarden
    spec:
      # KST 03:00 = UTC 18:00
      schedule: "0 18 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 3   # Keep last 3 successful Jobs for backup history verification
      failedJobsHistoryLimit: 3      # Keep last 3 failed Jobs for debugging
      jobTemplate:
        spec:
          template:
            spec:
              restartPolicy: OnFailure
              containers:
                - name: backup
                  image: busybox:latest
                  command: ["sh", "-c"]
                  args:
                    - |
                      set -e
                      DATE=$(date +%Y%m%d)
                      BACKUP_DIR="/backup-data"
                      RETENTION_DAYS=30

                      echo "[$(date)] Starting backup..."

                      # Date-stamped backup
                      cp /data/db.sqlite3 "$BACKUP_DIR/db-${DATE}.sqlite3"
                      cp /data/rsa_key.pem "$BACKUP_DIR/rsa_key-${DATE}.pem" 2>/dev/null || true
                      echo "[$(date)] Backup created: db-${DATE}.sqlite3"

                      # Retention: delete backups older than N days
                      DELETED=$(find "$BACKUP_DIR" -name "db-*.sqlite3" -mtime +${RETENTION_DAYS} -delete -print | wc -l)
                      find "$BACKUP_DIR" -name "rsa_key-*.pem" -mtime +${RETENTION_DAYS} -delete
                      echo "[$(date)] Retention: deleted ${DELETED} backups older than ${RETENTION_DAYS} days"

                      # List current backups
                      echo ""
                      echo "Available backups:"
                      ls -lh "$BACKUP_DIR"/db-*.sqlite3 2>/dev/null || echo "  (none)"
                      echo ""
                      echo "[$(date)] Backup complete."
                  volumeMounts:
                    - name: data
                      mountPath: /data
                      readOnly: true
                    - name: backup
                      mountPath: /backup-data
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: vaultwarden-data-vaultwarden-0
                - name: backup
                  persistentVolumeClaim:
                    claimName: vaultwarden-backup-data

  # =============================================================================
  # Gateway API HTTPRoute — Phase 4 (ingress-nginx → NGF) parallel deployment
  # =============================================================================
  # Runs alongside existing Ingress (the ingress: block above is kept as-is).
  # On Phase 6 cutover MetalLB reassigns the .55 IP to NGF ngf → real traffic auto-switches.
  #
  # Annotation mapping:
  #   force-ssl-redirect: true       → httpsRedirect sibling HTTPRoute (HTTP→HTTPS 301)
  #   proxy-body-size: 1024m         → ClientSettingsPolicy body.maxSize: 1024m
  #   proxy-{read,send}-timeout: 1800 → HTTPRoute timeouts.{request,backendRequest}: 1800s
  #   proxy-connect-timeout: 10      → NGF default applied (no per-listener option)
  #   limit-rps: 15                  → RateLimitPolicy rate: 15r/s (per source IP)
  #   limit-connections: 25          → not preserved (NGF doesn't directly support limit_conn; possible via SnippetsFilter
  #                                     but out of Phase 4 scope. Rely on app-level rate-limit)
  #   enable-cors: true              → relies on Vaultwarden's own CORS handling (controlled via app ENV)
  #   backend-protocol: HTTP         → default value, no extra policy needed
  #
  # Vaultwarden chart has no HTTPRoute template so injected via extraObjects (integrated with helm release lifecycle).

  # Main HTTPRoute — attached to HTTPS listener (uses wildcard-example-tls)
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: vaultwarden
      namespace: vaultwarden
    spec:
      parentRefs:
        - name: ngf
          namespace: nginx-gateway
          sectionName: https
      hostnames:
        - vault.example.com
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          timeouts:
            request: 1800s
            backendRequest: 1800s
          backendRefs:
            - name: vaultwarden
              port: 80

  # Sibling HTTPRoute — HTTP→HTTPS 301 redirect
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: vaultwarden-https-redirect
      namespace: vaultwarden
    spec:
      parentRefs:
        - name: ngf
          namespace: nginx-gateway
          sectionName: http
      hostnames:
        - vault.example.com
      rules:
        - filters:
            - type: RequestRedirect
              requestRedirect:
                scheme: https
                statusCode: 301

  # ClientSettingsPolicy — allow large body for attachments etc.
  - apiVersion: gateway.nginx.org/v1alpha1
    kind: ClientSettingsPolicy
    metadata:
      name: vaultwarden
      namespace: vaultwarden
    spec:
      targetRef:
        group: gateway.networking.k8s.io
        kind: HTTPRoute
        name: vaultwarden
      body:
        maxSize: "1024m"

  # RateLimitPolicy — per-IP request frequency limit
  - apiVersion: gateway.nginx.org/v1alpha1
    kind: RateLimitPolicy
    metadata:
      name: vaultwarden
      namespace: vaultwarden
    spec:
      targetRefs:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: vaultwarden
      rateLimit:
        rejectCode: 429
        local:
          rules:
            - key: $binary_remote_addr
              rate: 15r/s
              burst: 30
              zoneSize: 10m
