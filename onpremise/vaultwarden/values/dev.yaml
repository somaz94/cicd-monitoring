# =============================================================================
# Vaultwarden Custom Values (guerzon/vaultwarden chart)
# Components: Vaultwarden server, SQLite, Backup CronJob
# =============================================================================

# =============================================================================
# Domain & Core Settings
# =============================================================================
# DOMAIN env var — use https:// with self-signed certificate
domain: "https://vault.example.com"

fullnameOverride: "vaultwarden"

# =============================================================================
# Phase 5 retry attempted + rolled back to clean baseline (2026-04-29)
# =============================================================================
# Two Keycloak SSO cutover attempts on 2026-04-29 (morning + evening). All
# rolled back. Active config below = pre-Phase-5 baseline (chart default
# image, GitLab direct SSO, no cert mount, no SSRF override). Phase 5 trace
# kept entirely in plan + git history (commits f71e183 + this commit).
#
# Three hypotheses tested in the second attempt — ALL NEGATIVE:
#
#   1. hickory-resolver DNS fix (1.35.7 → 1.35.8 PR #7108) — same drop on
#      ALPN h2, hickory has nothing to fix in our case (DNS/TCP both OK).
#   2. SSRF guard (RFC1918 block) — set ICON_BLACKLIST_NON_GLOBAL_IPS=false,
#      same drop. SSRF would reject in CustomDnsResolver::post_resolve, but
#      our connection reaches TCP/TLS handshake.
#   3. Keycloak proxy header
#      access log show ZERO trace of vaultwarden's discovery attempt.
#      Server is innocent; vaultwarden's H2 client aborts the connection
#      AFTER ALPN h2 negotiation but BEFORE sending any HTTP/2 frame.
#
# Real root cause = client-side race in vaultwarden's reqwest 0.12.28 +
# hyper-util + h2 + rustls-tls stack with HTTP/2.
# `src/sso_client.rs::_get_client()` builds a fresh reqwest::Client per
# discovery call (no pool sharing with the SSRF-guarded CustomDnsResolver
# client). Re-attempt requires either:
#   a) vaultwarden upstream patch to add http1_only() option to sso_client
#   b) NGF/Keycloak ALPN tuning to drop h2 (impacts ArgoCD/Harbor too, risky)
#   c) Build vaultwarden from source with http1_only patch
#
# Re-attempt procedure (after upstream fix lands or H1 workaround chosen):
#   1. Bump image (preferred: chart catches up; fallback: image override).
#   2. Uncomment Keycloak `sso:` block, comment GitLab `sso:` block.
#   3. (optional) Re-enable debug logging block below for trace capture.
#   4. (optional) Re-enable cert trust patch (initContainer + ConfigMap +
#      extraVolumes/extraVolumeMounts) — required for self-signed
#      auth.example.com until cert-manager / Cloudflare DNS delegation lands.
#   5. (optional) Set iconBlacklistNonGlobalIps: "false" — required because
#      auth.example.com resolves to 192.168.1.55 (NGF MetalLB, RFC1918).
#   6. helmfile -f security/vaultwarden/helmfile.yaml apply
# =============================================================================

# Debug logging (only re-enable for SSO re-attempt; produces high log volume):
# logging:
#   logLevel: "info,vaultwarden::sso_client=trace,reqwest=trace,hyper=trace,hyper_util=trace,h2=trace,openidconnect=trace,rustls=debug"

# Image override — kept commented for Phase 5 re-attempt only. Tag MUST equal
# the `initContainers[0].image` below if both are re-enabled together.
# image:
#   tag: "1.35.8-alpine"

# =============================================================================
# Admin Portal
# =============================================================================
# Access: https://vault.example.com/admin
# Use plain text token below to log in.
# Vaultwarden also accepts argon2 hashed tokens.
adminToken:
  value: "exampleAdminPassword"

# =============================================================================
# SSO — GitLab OpenID Connect (active, post Phase 5 retry rollback 2026-04-29)
# =============================================================================
# Phase 5 attempted twice to cut over to Keycloak; rolled back both times.
# See the "Phase 5 retry" header at the top of this file for the 3 hypotheses
# tested and the real root cause (vaultwarden 1.35.x H2 client race). Active
# config below is the original pre-Phase-5 baseline — GitLab direct OIDC. The
# Keycloak block is preserved commented-out for the next attempt.
#
# Original setup steps:
#   1. GitLab Admin → Applications → New Application
#      - Name: Vaultwarden
#      - Redirect URI: https://vault.example.com/identity/connect/oidc-signin
#      - Confidential: Yes
#      - Scopes: openid, email, profile
#   2. Copy Application ID → clientId.value
#   3. Copy Secret → clientSecret.value
# =============================================================================
sso:
  enabled: true
  authority: "http://gitlab.example.com"
  scopes: "openid email profile"
  signupsMatchEmail: true
  ignoreEmailVerification: true
  pkce: true
  clientId:
    value: "<GITLAB_CLIENT_ID>"
  clientSecret:
    value: "<GITLAB_CLIENT_SECRET>"

# =============================================================================
# SSO — Keycloak OpenID Connect (commented — re-attempt after upstream fix)
# =============================================================================
# IdP: Keycloak `example` realm at auth.example.com
# Backend: Keycloak Identity Brokering → GitLab (login screen shows "Sign in with GitLab")
#
# Prerequisites (all handled by Phase 3 bootstrap — security/keycloak/scripts/kcadm-bootstrap.sh):
#   1. Keycloak `vaultwarden` client (confidential, Standard Flow + PKCE)
#      Redirect URI: https://vault.example.com/identity/connect/oidc-signin
#   2. Groups protocol-mapper on the client (oidc-group-membership-mapper)
#   3. Client secret reclaimed via kcadm-bootstrap output → clientSecret.value below
#
# To rotate the client secret:
#   kubectl -n keycloak exec keycloak-0 -- /opt/keycloak/bin/kcadm.sh \
#     create clients/<id>/client-secret -r example
#
# Note: signupsMatchEmail=true links Keycloak-brokered tokens (sub differs from
#       previous GitLab-direct sub) to the existing user by email — protects
#       master password / vault data through cutover. Vaultwarden SSO does NOT
#       support group-based access control; use allowSignups/signupDomains
#       to restrict who can register.
# =============================================================================
# sso:
#   enabled: true
#   authority: "https://auth.example.com/realms/example"
#   scopes: "openid email profile"
#   signupsMatchEmail: true
#   ignoreEmailVerification: true
#   pkce: true
#   clientId:
#     value: "vaultwarden"
#   clientSecret:
#     value: "HajIjzZPmjcshFx5hZAYI3dWCTHJ9NLc"

# =============================================================================
# Database (SQLite default)
# =============================================================================
database:
  type: "default"

# =============================================================================
# Features & Convenience Settings
# =============================================================================
webVaultEnabled: "true"
allowSignups: true
signupsVerify: "false"
showPassHint: false
allowInvitation: true
invitationsAllowed: true
invitationExpirationHours: "120"
emergencyAccessAllowed: true
requireDeviceEmail: "false"
orgGroupsEnabled: "true"
orgEventsEnabled: "true"
adminRateLimitSeconds: "60"
adminRateLimitMaxBurst: "10"

# =============================================================================
# Storage (Persistent Volume)
# =============================================================================
storage:
  data:
    name: "vaultwarden-data"
    size: "25Gi"
    class: "nfs-client"
    path: "/data"
    keepPvc: true
    accessMode: "ReadWriteOnce"

# =============================================================================
# Service
# =============================================================================
service:
  type: ClusterIP
  port: 80

# =============================================================================
# Ingress (HTTPS — self-signed certificate)
#
# =============================================================================
# Ingress disabled after Phase 6 cutover (2026-04-17) — NGF owns .55.
# HTTPRoute via extraObjects below is the sole path, HTTPS termination by
# Gateway (wildcard-example-tls) rather than this Ingress/vaultwarden-tls.
# Legacy fields retained for rollback reference; re-enable only if NGF path is reverted.
ingress:
  enabled: false
  class: "nginx"
  nginxIngressAnnotations: true
  additionalAnnotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hostname: "vault.example.com"
  path: /
  pathType: Prefix

# ── HTTPS with cert-manager + Let's Encrypt (alternative) ──
# Prerequisites:
#   1. Install cert-manager: https://cert-manager.io/docs/installation/
#   2. Create ClusterIssuer (e.g., cloudflare-issuer)
# Ref: https://github.com/dani-garcia/vaultwarden/wiki/Enabling-HTTPS
#
# ingress:
#   additionalAnnotations:
#     cert-manager.io/cluster-issuer: "cloudflare-issuer"
#   tlsSecret: "vaultwarden-tls"

# =============================================================================
# Resources
# =============================================================================
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  create: true

# =============================================================================
# Trust the self-signed wildcard cert (`wildcard-example-tls`) for SSO discovery
# =============================================================================
# Commented out — only required for the Phase 5 Keycloak SSO retry. VERIFIED
# working at the TLS layer in two prior attempts (vaultwarden's rustls
# completes the handshake with our wildcard cert; curl from inside the pod
# fetches the OIDC discovery JSON over both HTTP/1.1 and HTTP/2).
#
# Mechanism (re-enable together with the wildcard-example-ca ConfigMap below):
#   1. ConfigMap holds the wildcard cert (public material — ConfigMap, not Secret).
