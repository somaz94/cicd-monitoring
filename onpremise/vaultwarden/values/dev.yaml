  # Backup PVC
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: vaultwarden-backup-data
      namespace: vaultwarden
      annotations:
        nfs.io/storage-path: "vaultwarden-backup-data"
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: "nfs-client"
      resources:
        requests:
          storage: 25Gi

  # Backup CronJob — date-stamped with retention
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: vaultwarden-backup
      namespace: vaultwarden
    spec:
      # KST 03:00 = UTC 18:00
      schedule: "0 18 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 3   # Keep last 3 successful Jobs for backup history verification
      failedJobsHistoryLimit: 3      # Keep last 3 failed Jobs for debugging
      jobTemplate:
        spec:
          template:
            spec:
              restartPolicy: OnFailure
              containers:
                - name: backup
                  image: busybox:latest
                  command: ["sh", "-c"]
                  args:
                    - |
                      set -e
                      DATE=$(date +%Y%m%d)
                      BACKUP_DIR="/backup-data"
                      RETENTION_DAYS=30

                      echo "[$(date)] Starting backup..."

                      # Date-stamped backup
                      cp /data/db.sqlite3 "$BACKUP_DIR/db-${DATE}.sqlite3"
                      cp /data/rsa_key.pem "$BACKUP_DIR/rsa_key-${DATE}.pem" 2>/dev/null || true
                      echo "[$(date)] Backup created: db-${DATE}.sqlite3"

                      # Retention: delete backups older than N days
                      DELETED=$(find "$BACKUP_DIR" -name "db-*.sqlite3" -mtime +${RETENTION_DAYS} -delete -print | wc -l)
                      find "$BACKUP_DIR" -name "rsa_key-*.pem" -mtime +${RETENTION_DAYS} -delete
                      echo "[$(date)] Retention: deleted ${DELETED} backups older than ${RETENTION_DAYS} days"

                      # List current backups
                      echo ""
                      echo "Available backups:"
                      ls -lh "$BACKUP_DIR"/db-*.sqlite3 2>/dev/null || echo "  (none)"
                      echo ""
                      echo "[$(date)] Backup complete."
                  volumeMounts:
                    - name: data
                      mountPath: /data
                      readOnly: true
                    - name: backup
                      mountPath: /backup-data
              volumes:
                - name: data
                  persistentVolumeClaim:
                    claimName: vaultwarden-data-vaultwarden-0
                - name: backup
                  persistentVolumeClaim:
                    claimName: vaultwarden-backup-data

  # =============================================================================
  # Gateway API HTTPRoute — Phase 4 (ingress-nginx → NGF) parallel deployment
  # =============================================================================
  # Runs alongside existing Ingress (the ingress: block above is kept as-is).
  # On Phase 6 cutover MetalLB reassigns the .55 IP to NGF ngf → real traffic auto-switches.
  #
  # Annotation mapping:
  #   force-ssl-redirect: true       → httpsRedirect sibling HTTPRoute (HTTP→HTTPS 301)
  #   proxy-body-size: 1024m         → ClientSettingsPolicy body.maxSize: 1024m
  #   proxy-{read,send}-timeout: 1800 → HTTPRoute timeouts.{request,backendRequest}: 1800s
  #   proxy-connect-timeout: 10      → NGF default applied (no per-listener option)
  #   limit-rps: 15                  → RateLimitPolicy rate: 15r/s (per source IP)
  #   limit-connections: 25          → not preserved (NGF doesn't directly support limit_conn; possible via SnippetsFilter
  #                                     but out of Phase 4 scope. Rely on app-level rate-limit)
  #   enable-cors: true              → relies on Vaultwarden's own CORS handling (controlled via app ENV)
  #   backend-protocol: HTTP         → default value, no extra policy needed
  #
  # Vaultwarden chart has no HTTPRoute template so injected via extraObjects (integrated with helm release lifecycle).

  # Main HTTPRoute — attached to HTTPS listener (uses wildcard-example-tls)
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: vaultwarden
      namespace: vaultwarden
    spec:
      parentRefs:
        - name: ngf
          namespace: nginx-gateway
          sectionName: https
      hostnames:
        - vault.example.com
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          timeouts:
            request: 1800s
            backendRequest: 1800s
          backendRefs:
            - name: vaultwarden
              port: 80

  # Sibling HTTPRoute — HTTP→HTTPS 301 redirect
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: vaultwarden-https-redirect
      namespace: vaultwarden
    spec:
      parentRefs:
        - name: ngf
          namespace: nginx-gateway
          sectionName: http
      hostnames:
        - vault.example.com
      rules:
        - filters:
            - type: RequestRedirect
              requestRedirect:
                scheme: https
                statusCode: 301

  # ClientSettingsPolicy — allow large body for attachments etc.
  - apiVersion: gateway.nginx.org/v1alpha1
    kind: ClientSettingsPolicy
    metadata:
      name: vaultwarden
      namespace: vaultwarden
    spec:
      targetRef:
        group: gateway.networking.k8s.io
        kind: HTTPRoute
        name: vaultwarden
      body:
        maxSize: "1024m"

  # RateLimitPolicy — per-IP request frequency limit
  - apiVersion: gateway.nginx.org/v1alpha1
    kind: RateLimitPolicy
    metadata:
      name: vaultwarden
      namespace: vaultwarden
    spec:
      targetRefs:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: vaultwarden
      rateLimit:
        rejectCode: 429
        local:
          rules:
            - key: $binary_remote_addr
              rate: 15r/s
              burst: 30
              zoneSize: 10m
