# =============================================================================
# Thanos (Sidecar Mode) Custom Values
#
# This release handles: Compactor, Store Gateway, Object Storage
# Prometheus sidecar is configured in kube-prometheus-stack values.
#
# Prerequisites:
# - kube-prometheus-stack with thanos sidecar enabled
# - Object storage (MinIO, S3, GCS)
# =============================================================================

# Disable query in this release (handled by thanos-query release)
query:
  enabled: false

queryFrontend:
  enabled: false

# =============================================================================
# Compactor (compacts and downsamples long-term storage)
# =============================================================================
compactor:
  enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  persistence:
    enabled: true
    size: 20Gi
    storageClassName: nfs-client-server

  retentionResolutionRaw: 30d    # Keep raw data for 30 days
  retentionResolution5m: 180d    # Keep 5m downsampled for 6 months
  retentionResolution1h: 365d    # Keep 1h downsampled for 1 year

# =============================================================================
# Store Gateway (serves data from object storage)
# =============================================================================
storegateway:
  enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  persistence:
    enabled: true
    size: 10Gi
    storageClassName: nfs-client-server

# =============================================================================
# Ruler (not needed if using Prometheus rules)
# =============================================================================
ruler:
  enabled: false

# =============================================================================
# Receive (not needed for sidecar mode)
# =============================================================================
receive:
  enabled: false

# =============================================================================
# Object Storage Configuration
# TODO: Configure your object storage (MinIO, S3, GCS)
# =============================================================================
objstoreConfig: |-
  type: S3
  config:
    bucket: "thanos-metrics"
    endpoint: "minio.monitoring.svc.example-cluster.local:9000"
    access_key: "CHANGE_ME"
    secret_key: "CHANGE_ME"
    insecure: true

# Alternative: Use existing secret
# existingObjstoreSecret: thanos-objstore-secret
