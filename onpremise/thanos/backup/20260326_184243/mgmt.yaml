global:
  defaultStorageClass: "local-path"

fullnameOverride: "thanos"
clusterDomain: cluster.local

existingObjstoreSecret: "thanos-objstore"

query:
  enabled: true
  logLevel: debug
  # resources:
  #   requests:
  #     cpu: 200m
  #     memory: 4Gi
  #   limits:
  #     cpu: 400m
  #     memory: 8Gi
  replicaLabel:
    - prometheus_replica
  dnsDiscovery:
    enabled: false
  stores:
    # - kube-prometheus-stack-thanos-discovery:10901
    - dnssrv+_grpc._tcp.kube-prometheus-stack-thanos-discovery.monitoring.svc.cluster.local
    # - dnssrv+_grpc._tcp.thanos-multicluster-query-grpc.monitoring.svc.svc.cluster.local
  replicaCount: 1
  startupProbe:
    enabled: true
  # -- Schedule query on specific nodes using tolerations and nodeSelector.
  # Use when dedicated monitoring nodes have taints (e.g., key=monitoring:NoSchedule)
  # and labels (e.g., local-path=enabled) to isolate monitoring workloads.
  # tolerations:
  #   - key: "monitoring"
  #     operator: "Equal"
  #     effect: "NoSchedule"
  # nodeSelector:
  #   local-path: enabled

  # ── HTTP ingress (active) ──
  ingress:
    enabled: true
    hostname: thanos-query.example.com
    ingressClassName: nginx
    pathType: ImplementationSpecific
    path: /
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    grpc:
      enabled: false

  # ── HTTPS ingress with cert-manager + Let's Encrypt ──
  # Prerequisites:
  #   1. Install cert-manager: https://cert-manager.io/docs/installation/
  #   2. Create ClusterIssuer (e.g., cloudflare-issuer)
  # cert-manager auto-creates Certificate & TLS Secret via ingress annotation.
  # Ref: https://github.com/example-user/certmanager-letsencrypt
  #
  # ingress:
  #   enabled: true
  #   hostname: thanos-query.example.com
  #   ingressClassName: nginx
  #   pathType: ImplementationSpecific
  #   path: /
  #   annotations:
  #     nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  #     nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  #     cert-manager.io/cluster-issuer: "cloudflare-issuer"
  #   tls: true
  #   grpc:
  #     enabled: false

queryFrontend:
  enabled: true
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 1Gi
  #   limits:
  #     cpu: 200m
  #     memory: 2Gi
  rbac:
    create: true
  # -- Schedule queryFrontend on specific nodes using tolerations and nodeSelector.
  # Use when dedicated monitoring nodes have taints (e.g., key=monitoring:NoSchedule)
  # and labels (e.g., local-path=enabled) to isolate monitoring workloads.
  # tolerations:
  #   - key: "monitoring"
  #     operator: "Equal"
  #     effect: "NoSchedule"
  # nodeSelector:
  #   local-path: enabled

  # ── HTTP ingress (active) ──
  ingress:
    enabled: true
    hostname: thanos.example.com
    ingressClassName: nginx
    pathType: ImplementationSpecific
    path: /
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

  # ── HTTPS ingress with cert-manager + Let's Encrypt ──
  # Prerequisites:
  #   1. Install cert-manager: https://cert-manager.io/docs/installation/
  #   2. Create ClusterIssuer (e.g., cloudflare-issuer)
  # cert-manager auto-creates Certificate & TLS Secret via ingress annotation.
  # Ref: https://github.com/example-user/certmanager-letsencrypt
  #
  # ingress:
  #   enabled: true
  #   hostname: thanos.example.com
  #   ingressClassName: nginx
  #   pathType: ImplementationSpecific
  #   path: /
  #   annotations:
  #     nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  #     nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  #     cert-manager.io/cluster-issuer: "cloudflare-issuer"
  #   tls: true

bucketweb:
  enabled: false

compactor:
  enabled: true
  retentionResolutionRaw: 60d      # Retain raw data (10-second resolution) for 60 days
  retentionResolution5m: 60d       # Retain 5-minute downsampled data for 60 days
  retentionResolution1h: 1y        # Retain 1-hour downsampled data for 1 year
  consistencyDelay: 1h
  # -- Schedule compactor on specific nodes using tolerations and nodeSelector.
  # Use when dedicated monitoring nodes have taints (e.g., key=monitoring:NoSchedule)
  # and labels (e.g., local-path=enabled) to isolate monitoring workloads.
  # tolerations:
  #   - key: "monitoring"
  #     operator: "Equal"
  #     effect: "NoSchedule"
  # nodeSelector:
  #   local-path: enabled
  resources:
    requests:
      cpu: 100m
      memory: 400Mi
    limits:
      cpu: 200m
      memory: 800Mi

  # ── HTTP ingress (active) ──
  ingress:
    enabled: true
    hostname: thanos-compactor.example.com
    ingressClassName: nginx
    pathType: ImplementationSpecific
    path: /
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

  # ── HTTPS ingress with cert-manager + Let's Encrypt ──
  # Prerequisites:
  #   1. Install cert-manager: https://cert-manager.io/docs/installation/
  #   2. Create ClusterIssuer (e.g., cloudflare-issuer)
  # cert-manager auto-creates Certificate & TLS Secret via ingress annotation.
  # Ref: https://github.com/example-user/certmanager-letsencrypt
  #
  # ingress:
  #   enabled: true
  #   hostname: thanos-compactor.example.com
  #   ingressClassName: nginx
  #   pathType: ImplementationSpecific
  #   path: /
  #   annotations:
  #     nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  #     nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  #     cert-manager.io/cluster-issuer: "cloudflare-issuer"
  #   tls: true

  persistence:
    enabled: true
    storageClass: "local-path"
    accessModes:
      - ReadWriteOnce
    size: 10Gi

storegateway:
  enabled: true
  logLevel: warn
  # resources:
  #   requests:
  #     cpu: 400m
  #     memory: 3Gi
  #   limits:
  #     cpu: 800m
  #     memory: 6Gi
  # -- Schedule storegateway on specific nodes using tolerations and nodeSelector.
  # Use when dedicated monitoring nodes have taints (e.g., key=monitoring:NoSchedule)
  # and labels (e.g., local-path=enabled) to isolate monitoring workloads.
  # tolerations:
  #   - key: "monitoring"
  #     operator: "Equal"
  #     effect: "NoSchedule"
  # nodeSelector:
  #   local-path: enabled
  persistence:
    enabled: true
    storageClass: "local-path"
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  sharded:
    enabled: false
  pdb:
    create: true
    minAvailable: ""
    maxUnavailable: ""
  ingress:
    enabled: false

ruler:
  enabled: false

receive:
  enabled: false

receiveDistributor:
  enabled: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
  prometheusRule:
    enabled: false

volumePermissions:
  enabled: false

minio:
  enabled: false
