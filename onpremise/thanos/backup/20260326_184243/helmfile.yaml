repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami

releases:
  - name: thanos
    namespace: monitoring
    createNamespace: true
    chart: bitnami/thanos
    version: 15.7.23
    values:
      - values/mgmt.yaml

  # Uncomment to deploy multicluster query federation
  # - name: thanos-multicluster
  #   namespace: monitoring
  #   createNamespace: true
  #   chart: bitnami/thanos
  #   version: 15.7.23
  #   values:
  #     - values/mgmt-multicluster.yaml

# Hooks to ensure proper installation and upgrades
hooks:
  - events: ["presync"]
    showlogs: true
    command: "kubectl"
    args:
      - "create"
      - "namespace"
      - "monitoring"
      - "--dry-run=client"
      - "-o"
      - "yaml"
      - "||"
      - "true"
