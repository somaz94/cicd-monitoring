# =============================================================================
# Expose — chart-native HTTPRoute (Phase 7+, 2026-04-17)
#
# - expose.type: route → chart auto-generates HTTPRoute `harbor-route`
#   (templates/gateway-apis/route.yaml)
# - HTTPS termination is handled by `wildcard-example-tls` on the NGF ngf Gateway
#   (nginx-gateway ns). The chart `expose.tls.secret.secretName: harbor-tls` reference is
#   dead config not rendered in route mode but kept for values.schema.json compatibility.
# - The actual self-signed Secret `harbor-tls` was removed via `kubectl delete` on 2026-04-17
#   (consolidated into wildcard-example-tls).
# - sibling `harbor-https-redirect` HTTPRoute + ClientSettingsPolicy(body.maxSize:0) are
#   not supported by the chart → kept as raw in manifests/httproutes.yaml.
# - The existing `ingress:` block is kept commented out for rollback reference (below).
#
# When self-signed rollback is needed (e.g. Gateway/wildcard failure):
#   1. Regenerate harbor-tls via the openssl procedure in docs/tls-setup.md
#      kubectl create secret tls harbor-tls --cert=... --key=... -n harbor
#   2. Switch to `expose.type: ingress` + restore the ingress: block below
# =============================================================================
expose:
  type: route
  tls:
    enabled: true
    certSource: secret
    secret:
      # Not rendered in route mode (dead config). Real Secret must be recreated on rollback.
      secretName: harbor-tls
  # ingress:  # (Phase 7+ commented out — using expose.type: route. On rollback, set type=ingress + restore below)
  #   hosts:
  #     core: harbor.example.com
  #   controller: default
  #   className: "nginx"
  #   annotations:
  #     nginx.ingress.kubernetes.io/force-ssl-redirect: "true"    # Force HTTP → HTTPS
  #     nginx.ingress.kubernetes.io/ssl-passthrough: "false"      # TLS termination at ingress
  #     nginx.ingress.kubernetes.io/proxy-body-size: "0"          # Allow large image pushes
  route:
    # Chart HTTPRoute name: harbor-route (helpers.tpl `harbor.route` template)
    # Path routing: /api/, /service/, /v2/, /c/ → harbor-core; `/` → harbor-portal (chart built-in)
    hosts:
      - harbor.example.com
    parentRefs:
      - name: ngf
        namespace: nginx-gateway
        sectionName: https
  clusterIP:
    # The name of ClusterIP service
    name: harbor
    ports:
      # The service port Harbor listens on when serving HTTP
      httpPort: 80
      # The service port Harbor listens on when serving HTTPS
      httpsPort: 443

externalURL: https://harbor.example.com

# -----------------------------------------------------------------------------
# Alternative: plain HTTP (no TLS)
#
# Comment out the HTTPS `expose:` / `externalURL:` block above and uncomment
# the block below to serve Harbor over HTTP. Container runtimes (containerd,
# docker) pulling/pushing via HTTP must be configured with insecure-registries.
# -----------------------------------------------------------------------------
# expose:
#   type: ingress
#   tls:
#     enabled: false
#   ingress:
#     hosts:
#       core: harbor.example.com
#     controller: default
#     className: "nginx"
#     annotations:
#       nginx.ingress.kubernetes.io/force-ssl-redirect: "false"   # Disable HTTP → HTTPS redirect
#       nginx.ingress.kubernetes.io/ssl-passthrough: "false"      # No TLS termination needed
#       nginx.ingress.kubernetes.io/proxy-body-size: "0"          # Allow large image pushes
#   clusterIP:
#     name: harbor
#     ports:
#       httpPort: 80
#       httpsPort: 443
#
# externalURL: http://harbor.example.com

# =============================================================================
# SSO — Keycloak OpenID Connect (Phase 4, 2026-04-28+)
#
# Harbor does NOT expose OIDC settings as Helm values — they are stored in
# Harbor's core database. Configure via API/UI AFTER `helmfile apply` succeeds.
#
# Standard procedure (recommended automation):
#   ./scripts/harbor/admin/harbor-admin.sh set-oidc \
#       --name Keycloak \
#       --endpoint https://auth.example.com/realms/example \
#       --client-id harbor \
#       --client-secret '<phase-3 secret>' \
#       [--dry-run] [-y]
#
# Harbor UI
#   - Auth Mode:           oidc_auth   (one-way — already flipped on this cluster)
#   - OIDC Provider Name:  Keycloak
#   - OIDC Endpoint:       https://auth.example.com/realms/example
#   - Client ID:           harbor
#   - Client Secret:       (Phase 3 kcadm-bootstrap.sh output, see harbor-migration.md)
#   - Group Claim Name:    groups      (matches harbor client mapper)
#   - OIDC Admin Group:    <empty>     (admin@example.com promoted manually)
#   - OIDC Group Filter:   server      (only Keycloak `server` group members may sign in)
#   - OIDC Scope:          openid,profile,email
#   - Username Claim:      preferred_username
#   - Verify Certificate:  ON          (HTTPS + wildcard cert is trusted)
#   - Automatic onboarding: ON         (only users passing Group Filter are created)
#
# Migration history & user re-mapping:
#   security/keycloak/docs/harbor-migration.md (Phase 4 step-by-step)
# Detailed reference: cicd/harbor-helm/docs/oidc-setup-keycloak.md
# Legacy GitLab full procedure: cicd/harbor-helm/docs/legacy/oidc-setup-gitlab.md
# Permissions helper: scripts/harbor/admin/harbor-admin.sh
#
# -----------------------------------------------------------------------------
# Legacy: GitLab-direct OIDC (pre-Phase 4) — preserved for rollback only
# -----------------------------------------------------------------------------
# Until 2026-04-28 Harbor used GitLab as its OIDC IdP directly. To roll back:
#
#   Prerequisites:
#     1. GitLab Admin → Applications → New Application
#        - Name: Harbor
#        - Redirect URI: https://harbor.example.com/c/oidc/callback
#        - Confidential: Yes
#        - Scopes: openid, profile, email
#     2. Copy Application ID and Secret.
#
#   Apply via harbor-admin.sh:
#     ./scripts/harbor/admin/harbor-admin.sh set-oidc \
#         --name GitLab \
#         --endpoint http://gitlab.example.com \
#         --client-id '<gitlab application id>' \
#         --client-secret '<gitlab application secret>' \
#         --verify-cert false
#
#   GitLab-era field deltas vs Keycloak:
#     - oidc_name:          GitLab          (vs Keycloak)
#     - oidc_endpoint:      http://gitlab.example.com  (vs https://auth.example.com/realms/example)
#     - oidc_verify_cert:   false (HTTP)    (vs true on HTTPS)
#     - oidc_groups_claim:  groups (try groups_direct on GitLab 17+)  (vs groups)
# =============================================================================

persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: "nfs-client-server"
      accessMode: ReadWriteOnce
      size: 5Gi
    jobservice:
      jobLog:
        storageClass: "nfs-client-server"
        accessMode: ReadWriteOnce
        size: 1Gi
    database:
      storageClass: "nfs-client-server"
      accessMode: ReadWriteOnce
      size: 1Gi
    redis:
      storageClass: "nfs-client-server"
      accessMode: ReadWriteOnce
      size: 1Gi
    trivy:
      storageClass: "nfs-client-server"
      accessMode: ReadWriteOnce
      size: 5Gi
  imageChartStorage:
    disableredirect: false
    type: filesystem
    filesystem:
      rootdirectory: /storage
      #maxthreads: 100

existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
harborAdminPassword: "exampleAdminPassword"

# debug, info, warning, error or fatal
logLevel: info

# Run the migration job via helm hook
enableMigrateHelmHook: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
    additionalLabels:
      release: kube-prometheus-stack

trace:
  enabled: false

cache:
  # default is not enabled.
  enabled: true
  # default keep cache for one day.
  expireHours: 24


# If service exposed via "ingress", the Nginx will not be used
nginx:
  image:
    repository: goharbor/nginx-photon
    tag: v2.14.3
  automountServiceAccountToken: false
  replicas: 1
  revisionHistoryLimit: 10
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1

portal:
  image:
    repository: goharbor/harbor-portal
    tag: v2.14.3
  replicas: 1
  revisionHistoryLimit: 10
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1

core:
  image:
    repository: goharbor/harbor-core
    tag: v2.14.3
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1

jobservice:
  image:
    repository: goharbor/harbor-jobservice
    tag: v2.14.3
  replicas: 1
  revisionHistoryLimit: 10
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1

registry:
  registry:
    image:
      repository: goharbor/registry-photon
      tag: v2.14.3
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 1
  controller:
    image:
      repository: goharbor/harbor-registryctl
      tag: v2.14.3
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 1
  replicas: 1
  revisionHistoryLimit: 10
  upload_purging:
    enabled: true
    age: 168h
    interval: 24h
    dryrun: false

trivy:
  enabled: true
  image:
    # repository the repository for Trivy adapter image
    repository: goharbor/trivy-adapter-photon
    # tag the tag for Trivy adapter image
    tag: v2.14.3
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1

database:
  type: internal
  internal:
    image:
      repository: goharbor/harbor-db
      tag: v2.14.3
    password: "exampleAdminPassword"
    # shmSizeLimit: 512Mi
    shmSizeLimit: 2048Mi
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

redis:
  type: internal
  internal:
    image:
      repository: goharbor/redis-photon
      tag: v2.14.3

exporter:
  image:
    repository: goharbor/harbor-exporter
    tag: v2.14.3
  replicas: 1
  revisionHistoryLimit: 10
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1
