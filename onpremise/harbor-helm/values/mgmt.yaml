# =============================================================================
# Expose (HTTPS — self-signed certificate)
#
# Self-signed TLS secret must be created before deployment:
#   openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout harbor-key.pem -out harbor-cert.pem \
#     -subj "/CN=harbor.example.com" \
#     -addext "subjectAltName=DNS:harbor.example.com"
#   kubectl create secret tls harbor-tls \
#     --cert=harbor-cert.pem --key=harbor-key.pem -n harbor
#   rm harbor-key.pem
#
# See docs/tls-setup.md for the full procedure (renewal, containerd trust).
# =============================================================================
expose:
  type: ingress
  tls:
    enabled: true
    # The source of the tls certificate. Set as "auto", "secret" or "none".
    # "secret" reads the certificate from the Secret specified below.
    certSource: secret
    secret:
      # Must contain tls.crt and tls.key — created via docs/tls-setup.md.
      secretName: harbor-tls
  ingress:
    hosts:
      core: harbor.example.com
    controller: default
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"    # Force HTTP → HTTPS
      nginx.ingress.kubernetes.io/ssl-passthrough: "false"      # TLS termination at ingress
      nginx.ingress.kubernetes.io/proxy-body-size: "0"          # Allow large image pushes
  clusterIP:
    # The name of ClusterIP service
    name: harbor
    ports:
      # The service port Harbor listens on when serving HTTP
      httpPort: 80
      # The service port Harbor listens on when serving HTTPS
      httpsPort: 443

externalURL: https://harbor.example.com

# -----------------------------------------------------------------------------
# Alternative: plain HTTP (no TLS)
#
# Comment out the HTTPS `expose:` / `externalURL:` block above and uncomment
# the block below to serve Harbor over HTTP. Container runtimes (containerd,
# docker) pulling/pushing via HTTP must be configured with insecure-registries.
# -----------------------------------------------------------------------------
# expose:
#   type: ingress
#   tls:
#     enabled: false
#   ingress:
#     hosts:
#       core: harbor.example.com
#     controller: default
#     className: "nginx"
#     annotations:
#       nginx.ingress.kubernetes.io/force-ssl-redirect: "false"   # Disable HTTP → HTTPS redirect
#       nginx.ingress.kubernetes.io/ssl-passthrough: "false"      # No TLS termination needed
#       nginx.ingress.kubernetes.io/proxy-body-size: "0"          # Allow large image pushes
#   clusterIP:
#     name: harbor
#     ports:
#       httpPort: 80
#       httpsPort: 443
#
# externalURL: http://harbor.example.com

# =============================================================================
# SSO — GitLab OpenID Connect
#
# Harbor does NOT expose OIDC settings as Helm values — they are stored in
# Harbor's core database. Configure via Administration → Configuration →
# Authentication AFTER `helmfile apply` succeeds and HTTPS is reachable.
#
# Prerequisites:
#   1. GitLab Admin → Applications → New Application
#      - Name: Harbor
#      - Redirect URI: https://harbor.example.com/c/oidc/callback
#      - Confidential: Yes
#      - Scopes: openid, profile, email
#   2. Copy Application ID and Secret.
#
# Harbor UI settings:
#   - Auth Mode:           OIDC        (one-way — cannot revert to DB mode)
#   - OIDC Provider Name:  GitLab
#   - OIDC Endpoint:       http://gitlab.example.com
#   - Client ID / Secret:  from step 2 above
#   - Group Claim Name:    groups      (try groups_direct on GitLab 17+ if empty)
#   - OIDC Admin Group:    <empty>     (admin@example.com promoted manually via Users menu)
#   - OIDC Group Filter:   server      (only GitLab `server` group members may sign in)
#   - OIDC Scope:          openid,profile,email
#   - Username Claim:      preferred_username
#   - Verify Certificate:  OFF         (GitLab is HTTP — cannot verify)
#   - Automatic onboarding: ON         (only users passing Group Filter are created)
#
# Reference: cicd/argo-cd/values/mgmt.yaml (uses the same GitLab + `server` group).
# =============================================================================

persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: "nfs-client-server"
      accessMode: ReadWriteOnce
      size: 5Gi
    jobservice:
      jobLog:
        storageClass: "nfs-client-server"
        accessMode: ReadWriteOnce
        size: 1Gi
    database:
      storageClass: "nfs-client-server"
      accessMode: ReadWriteOnce
      size: 1Gi
    redis:
      storageClass: "nfs-client-server"
      accessMode: ReadWriteOnce
      size: 1Gi
    trivy:
      storageClass: "nfs-client-server"
      accessMode: ReadWriteOnce
      size: 5Gi
  imageChartStorage:
    disableredirect: false
    type: filesystem
    filesystem:
      rootdirectory: /storage
      #maxthreads: 100

existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
harborAdminPassword: "exampleAdminPassword"

# debug, info, warning, error or fatal
logLevel: info

# Run the migration job via helm hook
enableMigrateHelmHook: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
    additionalLabels:
      release: kube-prometheus-stack

trace:
  enabled: false

cache:
  # default is not enabled.
  enabled: true
  # default keep cache for one day.
  expireHours: 24


# If service exposed via "ingress", the Nginx will not be used
nginx:
  image:
    repository: goharbor/nginx-photon
    tag: v2.14.3
  automountServiceAccountToken: false
  replicas: 1
  revisionHistoryLimit: 10
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1

portal:
  image:
    repository: goharbor/harbor-portal
    tag: v2.14.3
  replicas: 1
  revisionHistoryLimit: 10
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1

core:
  image:
    repository: goharbor/harbor-core
    tag: v2.14.3
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1

jobservice:
  image:
    repository: goharbor/harbor-jobservice
    tag: v2.14.3
  replicas: 1
  revisionHistoryLimit: 10
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1

registry:
  registry:
    image:
      repository: goharbor/registry-photon
      tag: v2.14.3
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 1
  controller:
    image:
      repository: goharbor/harbor-registryctl
      tag: v2.14.3
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 1
  replicas: 1
  revisionHistoryLimit: 10
  upload_purging:
    enabled: true
    age: 168h
    interval: 24h
    dryrun: false

trivy:
  enabled: true
  image:
    # repository the repository for Trivy adapter image
    repository: goharbor/trivy-adapter-photon
    # tag the tag for Trivy adapter image
    tag: v2.14.3
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1

database:
  type: internal
  internal:
    image:
      repository: goharbor/harbor-db
      tag: v2.14.3
    password: "exampleAdminPassword"
    # shmSizeLimit: 512Mi
    shmSizeLimit: 2048Mi
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

redis:
  type: internal
  internal:
    image:
      repository: goharbor/redis-photon
      tag: v2.14.3

exporter:
  image:
    repository: goharbor/harbor-exporter
    tag: v2.14.3
  replicas: 1
  revisionHistoryLimit: 10
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 1
