# Deploy Harbor (private container registry) via helmfile, consuming upstream harbor/harbor chart.
# Namespace creation handled by `createNamespace: true` on the release (G11 — no duplicate presync hook).
# Lifecycle hooks: postsync apply Gateway-API raw manifests; preuninstall clean up HTTPRoutes.
# Chart version pinned. Bump via ./upgrade.sh after verifying the new release.

repositories:
  - name: harbor
    url: https://helm.goharbor.io

releases:
  - name: harbor
    namespace: harbor
    createNamespace: true
    chart: harbor/harbor
    version: 1.18.3
    values:
      - values/mgmt.yaml

    hooks:
      # postsync: apply raw Gateway API resources after chart upgrade.
      # The Harbor 1.18.3 chart with expose.type=route auto-generates the main HTTPRoute (harbor-route,
      # path routing core/portal). Two siblings the chart does not cover are kept as raw in manifests/:
      #   1. harbor-https-redirect HTTPRoute (HTTP listener → 301 → HTTPS)
      #   2. harbor-route ClientSettingsPolicy (body.maxSize:"0", unlimited docker push)
      # Note: helmfile apply skips hooks when there is no chart diff. Use helmfile sync for the first hook
      # application or when only manifests/ changes.
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args: ["apply", "-f", "manifests/"]

      # preuninstall: clean up HTTPRoute before helm uninstall — to avoid leaving stale attachment
      # references on the parent Gateway.
      - events: ["preuninstall"]
        showlogs: true
        command: "bash"
        args:
          - "-c"
          - "kubectl delete -f manifests/ --ignore-not-found=true --wait=true || true"

# helmDefaults:
#   wait: true
#   timeout: 900  # Harbor may need more install time, so set to 15 minutes
#   atomic: true
#   cleanupOnFail: true

# Pre-flight assertion: warn if no StorageClass available (Harbor needs PVC for DB + storage).
# Soft check — `|| true` keeps sync flowing even on empty cluster bootstrap.
hooks:
  - events: ["presync"]
    showlogs: true
    command: "sh"
    args:
      - "-c"
      - "kubectl get sc --no-headers 2>/dev/null || true"
