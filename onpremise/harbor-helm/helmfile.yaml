repositories:
  - name: harbor
    url: https://helm.goharbor.io

releases:
  - name: harbor
    namespace: harbor
    createNamespace: true
    chart: harbor/harbor
    version: 1.18.3
    values:
      - values/mgmt.yaml

# helmDefaults:
#   wait: true
#   timeout: 900  # Harbor는 설치 시간이 좀 더 필요할 수 있어서 15분으로 설정
#   atomic: true
#   cleanupOnFail: true

# Hooks to ensure proper installation and upgrades
hooks:
  - events: ["presync"]
    showlogs: true
    command: "kubectl"
    args:
      - "create"
      - "namespace"
      - "harbor"
      - "--dry-run=client"
      - "-o"
      - "yaml"
      - "||"
      - "true"

  # Harbor는 데이터베이스와 스토리지가 필요하므로, PVC가 있는지 확인
  - events: ["presync"]
    showlogs: true
    command: "kubectl"
    args:
      - "get"
      - "sc"
      - "--no-headers"
      - "||"
      - "true" 