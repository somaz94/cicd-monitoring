annotations:
  artifacthub.io/category: security
  artifacthub.io/changes: |
    - kind: added
      description: rbac.useClusterBindings option (default false) to bind keycloakcontroller-cluster-role and keycloakrealmimportcontroller-cluster-role via ClusterRoleBinding instead of in-namespace RoleBinding. Required for any cross-namespace watchNamespaces value because RoleBindings only grant their bound rules within their own namespace, so the operator silently 403s on list/watch in other namespaces otherwise.
    - kind: changed
      description: Documented the correct Quarkus Operator SDK constants for watchNamespaces — JOSDK_WATCH_CURRENT (own ns) and JOSDK_ALL_NAMESPACES (cluster-wide). The previous JOSDK_WATCH_ALL example was not a valid constant and the operator interpreted that string as a namespace name, returning 403 on startup.
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/somaz94/helm-charts
    - name: Keycloak Operator Documentation
      url: https://www.keycloak.org/operator/installation
    - name: Keycloak Operator Resources
      url: https://github.com/keycloak/keycloak-k8s-resources
    - name: Keycloak Release Notes
      url: https://www.keycloak.org/docs/latest/release_notes/index.html
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: Seamless Upgrades
  artifacthub.io/prerelease: "false"
